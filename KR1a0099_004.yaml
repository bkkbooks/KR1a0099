body:
  text: 易象鈎解卷四明陳士元撰巽下坎上井改邑不改井無喪無得往來井井汔至亦未繘井羸其瓶凶坎為水巽為木木入于水而上乎水汲水之象故曰井卦自泰來上本坤體為坤邑乾以一陽變之成坎而為井故曰改邑不改井井以不變為德濟物為功不為汲者喪而虛不為不汲者得而盈故曰無喪無得汲而往者其欲充汲而來者其望切故曰往來井井坤為腹二至四互兊兊為口井中之器有腹有口瓶也巽為繩有繘象兊毁折有羸瓶之象巽下二爻初六九二下虛上實在坎之下若瓶之覆而入井之象九三六四二爻下實上虛若井中之瓶覆者復仰之象而坎之九五隔其上若繫繘之象上六偶畫有瓶出井口上缺之象初六井泥不食舊井無禽初為井底六隂濁有泥象泥而不食遂為廢舊之井不特人不食禽亦不飲矣巽為禽初六無應有不食無禽之象九二井谷射鮒甕敝漏二變為艮有谷象巽為魚鮒魚類也子夏曰井中蝦蟇呼為鮒魚伊川曰或以為蝦或以為蟇程沙隨以為蝸牛徐進齊以為蛙井谷井旁之穴也射下注也初為井泥鮒乃微物之在泥中者九二比初故有此象卦互離兊離為大腹兊為口有口而大腹者甕也兊為毁折巽下畫斷有甕敝漏之象九三井泄不食為我心惻可用汲王明並受其福巽為股為入股入坎下泄井之象兊口仰而在上有不食之象坎為加憂有心惻之象九五為王離為明陽為福三居下卦之上泥已去谷已深井泄可以食矣而不食焉三與上應上為三惻曰井泄可用汲若有王明汲之則天下並受其福蓋望五也六四井甃無咎四偶畫如兩甓相連有井甃之象子夏易傳曰甃亦治也以磚壘井修井之壞也蓋四居坎下在互離之中卦自泰變本有坤體坤土坎水合離火而陶埏此甃井之磚所由出也夫初六才弱有井泥之象三之泄泄初之泥也九二位柔有井谷之象四之甃甃二之谷也泄與甃其皆日新之功乎九五井洌寒泉食陽剛有清洌之象五得坎中之乾乾為寒故曰寒泉泉者水始達也井者隂之質泉者陽之動也五互兊口在甃上故曰食三在甃下故曰不食上六井收勿幕有孚元吉幕于氏本作羃亡狄切覆也上六居井口偶畫兩開有勿幕之象收者汲器之出也幕者覆井之具也坎體有孚象井收勿幕大道為公天下信之並受其福矣故曰有孚元吉離下兊上革已日乃孚元亨利貞悔亡離為已日朱漢上謂當作戊己之己蓋卦變自遁來一變無妄二變家人三變離四變革無妄之震納庚革之離納己自庚至己十日浹矣十為數之極言待其極而後革人斯信之也革必有悔然必具乾德而悔可亡元亨利貞乾德也離兊皆乾體故孔子曰乾道乃革初九鞏用黃牛之革六二居離之中有黃牛之象初九近二宜鞏用之不可妄動也六二已日乃革之征吉無咎離六二納己故曰已日乃者難之也不輕革也已日則時久而事極猶難之而後動故吉且無咎九三征凶貞厲革言三就有孚九三過剛離性務上故戒曰征凶貞厲革言謂以當革之事言於衆也三就詳審也兑口有言象當爻位之三故曰革言三就九四悔亡有孚改命吉下三爻言革有謹重不輕改之意上三爻已革矣故九四直言改命命者天命也卦互乾乾為天有天命之象四當離兑之交離夏也兑秋也其夏令改而為秋令乎其湯武之時乎自三至五皆曰有孚三議革而後孚四有孚而後改淺深之序也未占有孚九五積孚之素也卦變革與中孚皆自遁來革有兑體又互巽體兑巽合體為中孚故革爻有孚象九五大人虎變未占有孚九五陽剛有大人之象兑伏艮艮為虎下離為龜上兑為決有占卜之象二五正應故曰未占有孚乾稱龍取其飛革稱虎取其變也上六君子豹變小人革面征凶居貞吉處革之終革道已成虎豹皆艮象也虎豹之皮可為革也朱漢上曰兑為虎胡雲峯曰虎豹皆兑象蓋不知兑伏艮艮體前剛故有此象耳兑說見於上有革面之象艮止也故曰居貞吉巽下離上鼎元吉亨鼎在天地間為中和調燮之器帝王守之為神器聖人鑄之為象器離伏坎離火坎水巽木為烹飪之器以形言則足腹耳鉉已具以質言則卦互乾兑為金既有木以巽火而又有乾亥豕伏坤牛兑羊離雉巽雞離鱉巽魚之屬亦皆充鼎之實而成其致養之功鼎之義無不吉亨故辭簡而善備也初六鼎顛趾利出否得妾以其子無咎巽伏震為足初在足下有趾象震為動初應九四有顛趾之象互兑為少女有得妾之象震為長子有以其子之象否者鼎中之穢也初六隂濁有否象焉九二鼎有實我仇有疾不我能即吉九陽為實怨偶為仇仇謂初也初之否二視之為疾矣即者就也初以一隂之孤而壓于衆陽之底無即我之便二以陽剛之才而充以中實之德無可即之隙又二變互艮艮為止有不我能即之象九三鼎耳革其行塞雉膏不食方兩虧悔終吉鼎與革對故九三言革九二鼎實三則鼎實過中三動成坎互離坎為耳上體本離三又互離火盛矣夫熟物謂之革鼎耳所以受鉉而行非以革物也今九三實盈火盛沸及鼎耳不可加鉉不可加鉉故難於移掇而其行塞離為雉雉膏八珍之一也鼎不可移則雉膏之美亦不得食矣兊口在上有不食之象然三五同功自有相合之時坎為雨故曰方雨兊為毁折故曰虧悔下卦之終故曰終吉九四鼎折足覆公餗其形渥凶四互兊為折四變互震為足有鼎折足之象餗鼎實也四往應初而越三三為公位有覆公餗之象其形渥王輔嗣以為霑濡之貌伊川以為赧汗夫覆餗大事不止於赧汗霑濡而已鄭康成虞仲翔作其刑剭朱子本義從之按新唐書元載以罪誅贊曰鼎折足其刑剭諒哉周禮秋官亦云剭誅蓋兊金毁折有刑剭之象也六五鼎黃耳金鉉利貞五中為黃位居鼎耳又伏坎為耳有黃耳之象卦變自遁來五上乾體乾為金為玉夫黃耳金鉉鼎貴極矣六五不正故以利貞戒之金鉉又指九二上九鼎玉鉉大吉無不利上居五前如鉉之貫耳舉鼎以養人者陽剛不撓如玉之不變於火也九剛上柔如玉之溫潤而栗也又荀九家震為玉上變為震故有玉鉉之象震下震上震亨震來虩虩笑言啞啞震驚百里不喪匕鬯虩虩不安貌蠅虎謂之虩以其周環顧慮不自寧也上下重震故有震來虩虩之象卦變自臨來臨有兊坤體三至五互坎伏離離目震動笑也兊口震動言也故有笑言啞啞之象百里坤數也雷聲聞於百里故有震驚百里之象棘木為七取赤心之義其形似畢長二尺刋柄與末詩云有救棘七是也震本坤體坤為肉二至四互艮艮為手坎為棘以手舉棘載肉而升者七也蓋祭儀先烹牢於鑊既納諸鼎而加冪將祭乃啓冪而以七出之升於俎上故王輔嗣曰七所以載鼎實陸績曰七者撓鼎之器也鬯香酒鄭𤣥以為秬黍之酒其氣調暢詩傳則以為香草蓋即鬱金之草以之釀酒謂之黃流坎為酒坤為黃震伏巽為草香草入酒而黃者鬯也記云天子鬯諸侯薰大夫蘭震為長子主祭故有不喪七鬯之象初九震來虩虩笑言啞啞吉初九陽爻見善明而用心剛去性近而見理早故其辭與彖同六二震來厲億喪貝躋于九陵勿逐七日得初陽方來二柔近之故曰震來厲億虞氏本作噫注云噫惜也二變為兊口故也朱子曰億未詳伊川曰億度也王輔嗣曰億辭也胡雲峯曰億喪貝大喪其貝也二變互離離為螺為蚌為龜有貝象二至四互艮有陵象九陽數也二進居初九之上有躋于九陵之象二守中正則所喪勿逐而自得自二至上又自上至二得數凡七離為日故有七日之象六三震蘇蘇震行無眚蘇蘇神氣緩散之貌互坎為眚震動不陷故無眚九四震遂泥重震不能省改將遂非而陷於坎中矣故曰遂泥六五震往來厲億無喪有事五與二同二乘乎初初來可畏故厲而有喪五乘乎四四既牽於柔而泥矣故五雖厲而無喪上六震索索視矍矍征凶震不于其躬于其鄰無咎婚媾有言索索神氣盡散也矍矍瞻視不寧也震道在四被震在五上非所震乃能見幾預防故曰震不于其躬于其鄰蓋震本坤體坤有鄰象互艮有躬象也三與上本為婚媾然兩隂必睽睽則有言三在互艮之中艮伏兊口為婚媾有言之象艮下艮上艮其背不獲其身行其庭不見其人無咎震反為艮震初九越五而之上一人背而往也九四降而為三一人背而來也兩人相背故見其背不得見其身人以前為身後為背也艮為門闕有庭象互震足有行其庭之象三四人位互坎為隱伏有不見其人之象初六艮其趾無咎利永貞四互震足初與為應而止於下有艮趾之象又居腓之下偶而散有趾象焉艮其趾者止其初也利永貞者止其終也六二艮其腓不拯其隨其心不快二動成巽巽為股有腓象卦伏兊互震有隨體艮手為拯二在互坎之下故曰不拯其隨坎為心病故二曰其心不快三曰厲薰心九三艮其限列其夤厲薰心限者一身上下之際俯仰之節也夤脊肉也薰心馬融王肅作熏心謂熏灼其心虞翻曰未聞易道以坎水熏灼人也荀爽亦以薰為傳録之誤按古本薰心作動心以互體震動故也三當俯仰之間制其身使不動強坐而止之則傷裂其夤亦危厲矣然身不動而心動所謂坐馳者也豈得為善止心者乎或曰限門閾也艮為門三居出入之際其畫竒而橫有門限之象彖謂行其庭今則艮其限則併其庭而不行彖傳艮其背今則列其夤則併其背而不動薰心謂操心至危也此說亦通六四艮其身無咎四坤體坤為身四當心位而身得所止則心之止可知矣六五艮其輔言有序悔亡三至上頥體艮伏兊口有輔與言之象艮輔者謹言也艮趾者慎行也上九敦艮吉重艮篤實故有敦象艮下巽上漸女歸吉利貞漸者不速之謂也女適人為歸艮男下於巽女有女歸之象咸取女吉取者之占也漸女歸吉嫁者之占也然皆以艮貞為主艮止也止而說則感以正為取女之吉止而巽則進以正為女歸之吉初六鴻漸于干小子厲有言無咎巽為雞為鸛艮為黔喙之屬互離為雉凡八卦廣象未嘗明言鴻而漸之六爻俱稱鴻何也蓋鴻乃隨陽之鳥自子午以東為陽子午以西為隂由艮達巽則子午以東陽氣之地也此卦艮巽合體故六爻稱鴻焉鴻本水鳥也初在互坎之下有水干之象艮為少男有小子之象艮伏兊口有言象鴻飛則長在前而幼在後幼者惟恐失羣故危厲而呼號長者必緩飛以俟之初六在後故為小子厲有言之象六二鴻漸于磐飲食衎衎吉艮為石有磐象互坎為飲食衎衎者鴻之和鳴也二居坎下柔順有應故有飲食衎衎之象九三鴻漸于陸夫征不復婦孕不育凶利禦冦三變成坤坤為平地有陸象三艮夫也四巽婦也九三過剛不中溺於情欲往交乎四而不知返有夫征不復之象四互離離為大腹孕也四動則離毁而為乾有婦孕不育之象坎為盜離為戈兵三往四來坎離變矣居艮止之上故有禦冦之象六四鴻漸于木或得其桷無咎巽為木而處艮山之上四在九三之前三以一陽橫衡於下有桷象鴻趾有膜不能棲木木雖高非所安也或於木之中得其桷而處之則安矣蓋鴻鳥乘風而發巽為風為高鴻飛風中故有漸于木之象九五鴻漸于陵婦三嵗不孕終莫之勝吉下卦艮五動亦成艮有陵象二五相應五動為艮夫二動則成巽婦自二至五歷三爻故曰三嵗三四相比而為夫婦雖孕而不敢育女歸不以正者也故凶二五相應而為夫婦婦雖不孕而三四終莫之勝女歸以正者也故吉上九鴻漸于陸其羽可用為儀吉先儒多以陸作逵王孔則作陸夫鴻飛自干自磐而至於陸則其高為驟自木自陵而至於陸則其進為退上九以陽剛之德秉謙巽之極其位彌高其心彌下此其羽翼翔集截然不亂豈不為天下之表儀乎巽為進退故鴻復漸于陸艮巽皆上實下散有鴻舒羽翼之象兊下震上歸妹征凶無攸利震為長男兄也則少女之兊為妹矣不曰歸女而曰歸妹妹者孤之窮也無父而有兄幼小之稱也父在則稱女不得以稱妹矣無父而歸於人者兄歸之也不待兄命而自往焉是淫奔而凶也何利之有初九歸妹以娣跛能履征吉娣媵也賤少之稱也初應四四居震下震為足兊為毁折跛也四至初有履象故曰跛能履九二眇能視利幽人之貞二至四互離離為目兊毁其目眇也卦以五為兄二即妹也故不言歸妹二居兊體而在下卦之中有幽人之象履亦下兊六三曰眇能視跛能履刺之也此分言於初二憫之也履與歸妹二爻皆曰幽人蓋以兊之隂爻掩於上也六三歸妹以須反歸以娣初至五有需體需須也三居需體之中與上無應故有歸妹以須之象夫九二幽貞尚待禮而未嫁者也今六三乃欲躐出九二之上此已挾緑衣僣分之心矣故聖人正其分曰汝當反而歸於娣媵之列以娣而從二可也戒之也朱子本義引或曰須女之賤者按天官書北方須女四星賤妾之象其星主女工故賤女之稱須者本此九四歸妹愆期遲歸有時九四剛健震主震伏巽變則成坤有震動之才又能巽伏而坤順是能從容俟時以全其妹之正者故有此象六五帝乙歸妹其君之袂不知其娣之袂良月幾望吉帝乙殷之賢君解見泰六五袂袖也假衣以明其人而不斥言之敬其德也君猶言小君謂嫡妹也其君之袂不如其娣之袂良見嫡妹之能儉也月婦道也卦互坎離離日坎月月在震東日在兊西日月東西相對有幾望之象月幾望而未望見嫡妹之能謙儉與謙妹之德也二為妹五為諸妹之兄妹無失德則兄有令聞故曰帝乙殷之賢君也上六女承筐無實士刲羊無血無攸利三在兊上女象也震為竹坤為方卦變自泰來有坤體竹器而方者筐象也胡氏楊氏皆謂震有虛筐之象夫三動往上是兊女承震筐矣而隂虛偶分故有女承筐無實之象兊為羊震為士兊金為刑殺刲羊也坎為血上動往三坎體變矣故有士刲羊無血之象女之適人實筐以贄於舅姑士之娶女刲羊以告於祠廟筐無實羊無血約婚不終者也曰女曰士未成夫婦之辭先女而後士咎在女矣故無攸利之占與彖繇同按左傳晉獻公嫁伯姬於秦筮得此爻史蘇曰不吉其繇曰士刲羊亦無􅎺也女承筐亦無貺也西鄰責言不可償也歸妹之睽猶無相也震之離亦離之震為雷為火為嬴敗姬車脫其輹火焚其旗不利行師敗于宗邱歸妹睽孤冦張之弧姪其從姑六年其逋逃歸其國而棄其家明年其死於高梁之虛及惠公在秦曰先君若從史蘇之占吾不及此離下震上豐亨王假之勿憂宜日中卦彖惟萃渙豐言王假惟王者能至此也坎為加憂六五柔尊震體有憂驚之象當豐之世治道大通可以無憂矣離為日南方午位有日中之象故聖人示以保豐之道曰勿憂宜日中初九遇其配主雖旬無咎往有尚初四同德相配遇者不期而㑹也旬十日也卦自泰來四本坤體坤之數十十者數之窮也初往遇四雖當窮數然亦可以無咎而往有尚蓋陽剛同德故也六二豐其蔀日中見斗往得疑疾有孚發若吉離方日中而二隂覆蔽於上有豐蔀之象蔀者用草蓋掩之謂震伏巽二至四互巽是有草以蔀之也下離上互兊伏艮艮離為賁天文之象也震少男其䇿七天文七數斗象也離目為見六二離明上遇柔暗之主猶日中見斗也夫日中無斗之理故曰疑疾巽為不果離伏坎為心病疑疾之象也離中虛故曰有孚上體震動故曰發若九三豐其沛日中見沫折其右肱無咎沛古本作斾王輔嗣以為幡幔震為𤣥黃卦自泰變上體坤坤為帛𤣥黃之帛震動於上者斾象也三變互艮艮離亦天文之象沫斗後小星也斾之蔽明甚於蔀見沫之暗甚於見斗三以極明而應上六之極暗故有此象兊為右為折艮為肱震伏巽亦有肱象三互兊故曰折其右肱上六極暗不可大事三折其右肱示不可用故可免咎九四豐其蔀日中見斗遇其夷主吉四居震下伏巽有覆草掩蔽之象六五暗主二應而四承故皆有日中見斗之象夷等也下有初九之賢與四為等夷故曰遇其夷主吉六五來章有慶譽吉六二離中有明德之章者也六五虛心以來之則有慶有譽而得吉五居震體故有來象上六豐其屋蔀其家窺其户閴其無人三嵗不覿凶自二至上有大壯體棟宇之象也上六質暗位髙欲豐大其屋適所以蔀其家耳上往之四四動之上歷三位而成艮有三嵗之象艮為門闕故曰屋曰家曰戶離目為見故曰窺曰覿閴靜也坤象也四變成坤則坤上離下而為明夷故取至暗之象焉按左傳鄭公子曼滿與王子伯廖語欲為卿伯廖告人曰無德而貪其在周易豐之離弗過之矣間一嵗鄭人殺之艮下離上旅小亨旅貞吉山止不動旅館之象火動不止旅人之象旅與豐反豐為大則旅為小矣故曰小亨然貞吉而曰旅貞吉者何也謂其不足全夫貞吉之道惟足以為旅之貞吉而已故曰旅貞吉也初六旅瑣瑣斯其所取災隂柔在下此小人棄逐而在旅者也方且經營瑣細之事以自封殖此所以致災也六二旅即次懷其資得童僕貞即次旅所安財貨旅所資童僕旅所役二柔中正得其位矣有即次之象互巽為近利市三倍有懷資之象艮少男有得童僕之象九三旅焚其次喪其童僕貞厲三近離有焚次之象互兊毁折則艮體損矣有喪童僕之象九四旅于處得其資斧我心不快四居艮止之上有旅于處之象陽剛能斷有資斧之象蓋離為戈兵又互巽木在兊金之下斧象也離為螺貝資象也徐進齊曰資當作齊按漢書王莽傳引巽爻之文曰喪其齊斧應劭曰齊利也謂喪其利斧也四變互坎為心病故曰我心不快六五射雉一矢亡終以譽命離為雉文明之物也離伏坎坎為弓離為矢射雉一矢亡言不待再發也終有譽命言上得天之命下得人之譽也上九鳥焚其巢旅人先笑後號咷喪牛于易凶離為飛鳥上變為震震為竹葦互巽為木鳥隱於竹木之上有巢象上九位髙是鳥之有巢者也離火出於巽木之上有焚巢之象旅人得高位先笑也焚巢後號咷也震為聲離為目兊為口巽為號兊澤流於目巽號震聲出於口有笑與號咷之象坤土為牛牛者稼穡之具離為牝牛者離火生坤土也上在離體有牛象上變震木木尅坤土旅而不歸失其稼穡之具矣故有喪牛之象巽下巽上巽小亨利有攸往利見大人隂承陽為巽隂為小故曰小亨巽則不忤物故利往大人二五也利見之者初四也初六進退利武人之貞初居重巽之下巽為進退互兊為西方之金有武人之象九二巽在牀下用史巫紛若吉無咎巽卑也為木為股木卑而股分於下牀之象也二居巽卑之地有牀下之象互兊為口舌有用史巫之象或問巽為牀剝何以言牀也曰巽體二陽覆上而橫牀之幹也一隂承上而對峙牀之足也剝則牀幹傾落於下矣故剝凶而巽吉孔頴達曰史謂祝史巫謂巫覡皆接事鬼神之人也紛若盛多之貌九三頻巽吝三居二巽之間巽而又巽故曰頻巽六四悔亡田獲三品離為網罟互離故有田象三品或云上殺中殺下殺非也本義乾豆賓客君庖之說出於王制九五貞吉悔亡無不利無初有終先庚三日後庚三日蠱六五變而為巽之九五蠱振於始故曰甲巽更於終故曰庚甲庚皆曰先後三日者聖人謹始終之意也甲於四時為春於五行為木蠱下巽木上艮居寅地故有甲象庚於四時為秋於五行為金於五色為白巽為曰乾為庚金巽本乾體先天圖巽居申方故有庚象上九巽在牀下喪其資斧貞凶上居重巽之極故亦有牀下之象互離有資象巽木互兑金有斧象旅九四居卦中故得資斧上居卦外故喪資斧斧者斷也巽為不果有喪斧之象兊下兊上兊亨利貞彖與咸同咸取無心之感兊取不言之說初九和兊吉兊自有和義初陽處下是孤遠之臣負剛正之氣說而不流故曰和兊九二孚兊吉悔亡二五剛中皆有孚象二當大臣之位居兊說之世君臣同德而不為容說故有孚兊之象六三來兊凶三曰來兊來上六也上曰引兊引六三也致彼曰來汲下曰引小人合則君危而國敗矣故曰凶三互巽巽伏震震足動故有來象九四商兊未寧介疾有喜四當兊時居三五之間凡事必商度而謹擇其心未敢自寧也何也四為近君之臣也六三來兊是小人以妄說病吾君心者也九四剛正介而隔之使六三不得近於九五是之謂介疾也介如左傳介在東都之介介猶隔也小人去而天下安故曰有喜卦互巽離巽為不果有商兊未寧之象離伏坎為心病有疾象介謂九陽商謂四隂也九五孚于剝有厲兊秋也五為季秋九月之時也九月為剝他爻皆稱兊而五獨稱剝深為君人者戒也兊為夬夬之極也必剝况六三以兊說而來上六以兊說而引五若輕信二隂而孚焉則剝之兆成矣豈不有危厲也哉上六引兊二至五互巽巽為繩兊伏艮艮為手以手挽繩有引象上與三應小人在上引其黨類也故有引兊之象巽卦初四皆隂而吉兊卦三上皆隂而凶巽伏於內君子之道也兊見於外小人之道也坎下巽上渙亨王假有廟利涉大川利貞萃渙皆互艮艮為門闕又上卦九五王者陽剛中正以居尊位為宗廟之主故皆有王假有廟之象涉川濟難也朱子曰巽木坎水舟楫之象坎水大川也巽木所以涉川者也大難既散宜正道以安集之故曰利貞初六用拯馬壯吉二在坎中為美脊之馬初六隂弱賴九二陽剛以濟之也卦互震艮震足艮手有用拯馬壯之象初不言渙者拯之於早不至於渙也孔頴達以壯吉為句謂用馬以自拯拔而得壯吉也非是九二渙奔其機悔亡卦自否變是九自四來而為二也互震動有奔象震為木九二陽畫橫亘於上機之面也初六偶畫分峙於下機之足也又坎木為堅多心為矯揉互卦震足艮手揉木令曲而手足據其上故有機之象焉九自四而來奔得其所矣故曰悔亡六三渙其躬無悔三居坎上而近巽坎水得風而散巽木得水而通故渙其躬以出險也此爻與艮四爻同象艮上體為艮而四在互坎之上故曰艮其身渙下體為坎而三在互艮之下故曰渙其躬蓋坎艮皆坤體坤為身也六四渙其羣元吉渙有丘匪夷所思三隂為羣四無應與有渙羣之象五艮為山有邱象邱者聚之高也夷平也謂二隂也一說邱者不夷者也四之渙有邱也嘗懷匪夷之思必欲盡平夷之而後已然後得元吉也楊誠齊曰巽為高故曰有邱九五渙汗其大號渙王居無咎坎有汗象巽有號象五為王位陽剛中實有居積之象五當渙時必散其號令居積而後無咎汗出于中而浹四體猶大號出於君心而浹於四方也又艮為止故有居象上九渙其血去逖出無咎朱子曰逖當作惕然先儒多以渙其血為句今以小象考之良是坎為血六三近險見傷上六相應故有渙其血之象上遠於坎若不係於三而去之遠出乎險則可以無咎兊下坎上節亨苦節不可貞天地之數以六十為節故易卦至六十而為節月有中氣有節氣節以損其過而歸之中也節則裕裕則通苦節則不中故不可貞貞者恆久之謂也不可貞言不能持久也朱漢上曰凡物過則苦味之過正形之過勞心之過思皆曰苦故節之過者曰苦節也初九不出戶庭無咎艮為門闕卦互艮體下兊為戶四在門闕之中為庭初九窮而在下剛正自守不失足於四又艮體止而不行故有不出戶庭之象胡雲峯曰兩戶為門初前遇九二九陽竒畫也有戶象二前遇六三六隂偶畫也有門象九二不出門庭凶初九兊始兊西酉位闔戶之象九二互震震東卯位闢戶之象初以不出而無咎者孤遠也二則身居大臣之位上逄九五剛中之君可出而不出者也故曰不出門庭凶六三不節若則嗟若無咎三以兊說隂柔之極而在人上挾其說豫充盈之勢侈泰以自奉而不知節及其禍至然後慨歎亦無及矣此則自作之孽將何所歸咎哉故孔子曰不節之嗟又誰咎也蓋絶之也三居兊口故有嗟若之象六四安節亨卦自泰來上本坤體有安靜之象六三之不節不及於過者也上六之苦節過於節者也六四中節而安故無不亨九五甘節吉往有尚五行土居中其味甘九五居上卦之中有甘象焉孔頴達曰甘者不苦之名也上則過中而苦矣上六苦節貞凶悔亡洪範曰炎上作苦此卦上坎伏離火上六居卦之上故有苦節之象兊下巽上中孚豚魚吉利涉大川利貞中者孚之宅孚者心之充卦體中虛信發於心故曰中孚豚魚朱子曰無知之物孔頴達曰魚者蟲之幽隱豚者獸之微賤按八卦之象坎為豕巽為魚中孚上巽下兊有魚象無豚象也一說豚魚即所謂江豚生於大澤中知風有信者是豚魚本一物巽之象也兊金刳巽木浮於澤水之上故有利涉大川之象初六虞吉有他不燕虞程朱以為度王孔以為專初當中孚之始在於度所宜信而專應乎四也若有他志而說三焉則不得燕安矣初變則成坎陷故有不燕之象九二鳴鶴在隂其子和之我有好爵吾與爾靡之此卦全體似離離為飛鳥荀爽以震為鵠集解則以為鶴今二至四互震是為鶴鶴陽鳥以九取象在隂以二取象又兊為正秋為口舌鶴鳥感秋而鳴故兊體亦有鳴鶴之象卵生為孚故中孚取鶴子之象又五互艮為少子亦有子象也我吾五自謂也九五君位尊貴陽剛中正有好爵之象爾指二也靡係也巽為繩有靡係之象鶴鳴子和天機自動好爵爾靡天理自孚也王輔嗣孔頴達則以靡為散也謂不私權利惟德是與我有好爵願與賢者分散而共之也是以好爵為人爵矣六三得敵或鼓或罷或泣或歌三四同類而志異相近而不相應故曰得敵震為鼓艮為止故曰或鼓或罷三動互離為目兊澤流於目故曰或泣震為聲出於兊口之中故曰或歌或之者無常度也隂不中正故也六四月幾望馬匹亡無咎四變互離離伏坎坎為月離為日下體兊卦為西互震為東月東日西故曰幾望震為作足之馬初應四初變則成坎為美脊之馬故有馬匹之象四居巽下月幾望而不盈隂柔得正不係於初故馬匹亡也一說馬匹謂三也六四承五而棄三故得無咎九五有孚攣如無咎五互艮艮為手有拘攣之象攣如者相牽繫不絶之謂也二曰靡五曰攣皆取中孚固結約束而不可解之義上九翰音登于天貞凶王輔嗣以翰為高飛朱子據禮記之文直以翰音為雞蓋雞鳴必振其羽故曰翰音巽為雞故有翰音之象夫豚魚知風鶴知夜半雞知旦皆物之有信者故周禮雞人亦取孚義五上為天上九居天之上是巽雞之翰音欲效澤鳥之鳴登聞於天非其所能矣故曰貞凶艮下震上小過亨利貞可小事不可大事飛鳥遺之音不宜上宜下大吉隂過之時用靜吉用作凶故可小事不可大事中二爻象鳥之身上下四爻象鳥之翼又卦變明夷有離體離為飛鳥初往之四自下而升變震體震動也有飛鳥之象震為聲聲出於上而艮止於下有遺音之象不宜上宜下大吉伊川謂鳥飛迅速聲出而身已過聲逆而上則難順而下則易先儒多從之夫鳥聲之出音韻四逹惟其響之所至豈有上難下易之分乎蓋鳥有所飛必有所歸若飛而無歸下棄其棲止之艮山而欲上窮乎震之太空徒哀鳴而遺音則無及矣此不可大事之象也故占者不宜於過高而宜於卑下乃得大吉此可小事之謂也故彖傳曰剛失位而不中是以不可大事也有飛鳥之象焉飛鳥遺之音是孔子以飛鳥遺音為剛失位不中之象也又曰不宜上宜下大吉上逆而下順也蓋指人之過高則逆卑下則順非謂鳥音也初六飛鳥以凶初居艮下當止而飛故凶六二過其祖遇其妣不及其君遇其臣無咎三父四祖五隂而尊有祖妣之象君謂五臣謂二過其祖遇其妣上逆也不及其君遇其臣下順也一說祖始也初居卦始有祖象焉二在初上故曰過其祖妣者毋之稱二隂居中得正故曰遇其妣不敢僣五位而安其分故曰不及其君遇其臣九三弗過防之從或戕之凶弗能過隂則當防之若不能防而又從之則或戕之矣此卦全體似坎有防象互兊有戕象九四無咎弗過遇之往厲必戒勿用永貞四剛不過故無咎下遇初六矣又往從乎上則厲必以為戒而勿用以往當永守正道庶可無咎也六五密雲不雨自我西郊公弋取彼在穴五互兌兌澤之氣上升為雲互巽為風艮止而風散之故密雲而無雨卦自臨變上體本坤坤為郊兑為西故有西郊之象卦體似坎先儒曰小過厚坎也坎為弓故易於互坎伏坎取弋射之象如射隼射雉之類是已穴者隂也坎象也巽入於艮山之下亦有穴象焉初上皆云飛鳥非在穴之鳥也在穴者鳥之不飛者也上互兌金下互巽絲以巽絲繫於兌金之下坎弓而震動之者弋象也公弋言王公之弋也易之取象小者為弋大者為田最大者為狩上六弗遇過之飛鳥離之是謂災眚上動成離為飛鳥離目巽繩為網罟之象上亢而過如飛鳥不免弋獵之傷上與三應三變則互坎上之變離亦伏坎也故有災眚之象離下坎上既濟亨小利貞初吉終亂濟者濟渡之名既者盡也萬事盡濟大小皆亨言小者亨則大可知也六爻隂陽各得其正故曰利貞始離明而後坎險故有初吉終亂之戒初九曵其輪濡其尾無咎初與四應四坎為輪初變成艮艮為手故有曵其輪之象初在卦後為尾又居互坎之下故有濡其尾之象六二婦喪其茀勿逐七日得離為中女有婦象二居離中乃五坎之婦也坎為車婦車有茀以自蔽也處初三之間強暴相凌又伏坎為盜有喪茀之象自二至上復自上至二凡得七數而二之中正固在也故有勿逐七日得之象一說茀首飾也離明之象也按茀字訓解不一說文曰茀草多貌又治也故詩曰茀厥豐草又福也故詩曰茀祿爾康矣又蔽也故詩曰翟茀以朝又茀茀强盛貌又天官書星茀于河茀即孛也又左傳宣公八年始用葛茀茀即綍也此爻婦茀則取翟茀之義九三高宗伐鬼方三年克之小人勿用鬼方幽遠小國蒼頡篇曰鬼遠也三近坎體有鬼方之象離為戈兵有伐象高宗或占得此爻故以為辭高宗賢君且遲以三年甚言行師不可輕也三與上應歷三爻故曰三年卦變自泰來泰上坤體坤為年為小人六四繻有衣袽終日戒程朱皆以繻當作濡謂四在坎體也未允按許愼說文采繒為繻敝衣為袽且引易辭繻有衣袽為證徐鉉曰繻符帛也出漢書又曰袽緼也虞翻曰袽敗衣也夫繻有衣袽者謂美帛而繼以敝敗之衣盛將衰矣既濟過中之象也可不終日戒乎卦自泰變上坤為帛互兊為毁有衣袽之象離為日四出離外有終日之象程朱以繻為濡者本於王孔注疏九五東鄰殺牛不如西鄰之禴祭實受其福二五相易復為泰卦互震兊五震體東鄰象也二兊體西鄰象也坤為牛兊為刑坎為血離為夏有禴祭之象五當既濟之盛而陷乎險不如二當始濟之時麗乎文明而實受其福也上六濡其首厲上為卦首坎水為濡故有濡其首之象坎下離上未濟亨小狐汔濟濡其尾無攸利嗚呼六十四卦之辭其論隂陽消長治亂存亡之幾詳矣既濟之後而猶有未濟者其聖人防危憂患之心乎故處既濟者貴乎有持守克終之志處未濟者貴乎有進為克終之才下卦坎為水為隱伏物之穴居隱伏往來水間者狐也故荀九家亦以坎為狐初六居坎之始有小狐之象在卦之後有尾象狐能渡水濡尾則不能濟隂弱無才故也初六濡其尾吝初居坎下柔不能濟故吝九二曳其輪貞吉坎為輪二變互艮故曰曳輪一說乘輪者人曳輪者馬也坎為美脊之馬故有曳輪之象六三未濟征凶利涉大川既濟未濟之爻多不出卦名此爻獨言卦名者三以隂柔不中正當未濟之時終難濟也坎水為大川三在坎上變則成巽巽木浮於坎水之上有利涉大川之象九四貞吉悔亡震用伐鬼方三年有賞于大國既濟之三未濟之四皆離體有征伐之象震動也四變互震以陽剛之才而奮震動之威以伐遠夷則成大功受大賞必矣既濟鬼方謂坎之上六未濟鬼方謂坎之初六也又四變互坤有大國之象受賞必曰三年用師不敢輕也慎之也六五貞吉悔亡君子之光有孚吉離為文明有光象君子謂九二二在坎中坎月之光受離日之暉以為光咸有一德之義也五以離之中虛光於二二以坎之中實光於五上下有孚故吉上九有孚于飲酒無咎濡其首有孚失是上九陽實為有孚之象坎為酒象卦自困來上當兊口為飲酒之象既濟上六之濡首者水也未濟上九之濡首者非水也酒也水溺人止於一身酒之溺人溺其心以及天下國家其禍大矣故曰失是是者宜也天之時也道之中也易辭得失之所繫也孔子曰飲酒濡首亦不知節也於初六曰濡其尾亦不知極也事不過中之謂節事協於中之謂極初上二爻孔子皆以不知責之然則學易者豈可不知時中也乎易象鈎解卷四
