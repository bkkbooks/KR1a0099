body:
  text: 易象鈎解易類提要臣等謹案易象鈎解四卷明陳士元撰士元字心叔應城人嘉靖甲辰進士官至灤州知州是編專闡經文取象之義前有士元自序稱朱晦菴張南軒善談易者皆謂互體五行納甲飛伏之類俱不可廢蓋文周彖爻雖非後世緯數瑣碎而道則無不冒焉傳註者惟以虚元之㫖例之有遺論矣其履卦註又曰京房之學授受有自今之學士大夫擯斥不取使聖人不因卜筮而作易惟欲立言垂訓則畫卦揲蓍何為哉朱子曰易之取象固必有所自來而其為説必已具于太卜之官今不可復考亦不可謂象為假設然則京氏之學安知非太卜所藏者耶云云案太卜之法雖不可考然左傳所載變爻互體諸占猶可以見其崖畧漢易自田何以下無異説孟喜六日七分之學云出田王孫而田王孫之徒以為非焦贛直日用事之例云出孟喜而孟喜之徒又以為非劉向校書亦云惟京氏為異黨漢書儒林傳源委秩然可以覆按京氏書雖多散佚而易傳三卷猶存其占法亦大概可考與左傳所載迥殊士元以京氏易當太卜所藏殊為無據且京氏之法絶不主象引以為明象之證亦失其真然其謂易以卜筮為用卜筮以象為宗則深有合于作易之本㫖故所論雖或穿鑿而犁然有當者為多要勝於虚談名理荒蔑古義者矣是書每卷標目之下皆題歸雲别集卷數自五十八至六十一蓋當時編入全集如李石方舟集收易互體之例其序又稱往為彚解二卷括其大凡考明史藝文志載士元易象鈎解四卷易象彚解二卷則彚解亦𤼵明象學者今以未見其書故不著録焉乾隆四十一年五月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀易象鈎解原序昔者伏羲則河圖爲六十四卦是爲先天易文王繫彖辭周公繫爻辭是爲後天易孔子曰易之興也其於中古乎作易者其有憂患乎今觀泰否剥復損益夬姤之相次也隂陽消長治亂存亡之幾㣲矣先儒傳註論義理不論禍福慮人以卜筮淺易也發明彖爻非不顯著而取象之由則畧而不論夫文周繫辭觀象以闡吉凶占者玩辭稽象以定趨避朱晦菴張南軒善談易者皆謂互體五行納甲飛伏之類俱不可廢豈不豁然於蓍變而歉然於傳註哉蓋文周彖爻雖非後世緯數𤨏碎拘拘互體五行納甲飛伏也而道則無不冐焉傳註者惟以虚𤣥之㫖例之有遺論矣往余爲彚解二卷括其大凡而舊所謬承尚闕質問者兹則述之簡篇題曰鈎解云鈎曲也轉取也本無所見引物而旁通者也若夫隂陽消長治亂存亡之幾其何能解哉其何能解哉嘉靖辛亥冬十月朔日後學楚應城陳士元識
