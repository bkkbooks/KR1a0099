body:
  text: 易象鈎解卷二明陳士元撰艮下坤上謙享君子有終六十四卦皆有凶悔吝惟謙六爻不然夫謙則無不亨然惟君子有終何也小人有假於其初者也九三人位為謙之主故稱君子焉易以元亨利貞為全德而謙辭獨言亨者蓋謙即元之善君子有終則利貞之義具矣初六謙謙君子用涉大川吉謙主九三故三爻與彖辭皆稱君子有終初六亦曰君子何也三勞而謙在上之君子也尊而光者也初謙而謙在下之君子也卑而不可踰者也皆所以為君子之終用涉大川謂用此濟難可也况平居乎卦互震木坎水故曰涉川六二鳴謙貞吉鳴謙獨見於二上兩爻者三四五互震震為聲有鳴象二上近之故曰鳴謙二重隂嫌於不正而承乘又皆君子其鳴也鳴其守正而不求應也九三勞謙君子有終吉三互坎坎為勞卦故曰勞謙乾之三言君子坤之三言有終謙之三兼乾坤之占辭所謂勞者即終日乾乾或從王事而謙則惕厲含章者也六四無不利撝謙六四坤順重隂上近六五謙恭之君下賴九三勞謙之臣故無不利而四居危地又當撝揚其謙艮為手有撝象六五不冨以其鄰利用侵伐無不利隂虛故曰不富凡人以財物周贍鄉里乃得其用六五柔尊能謙故不富而能以其鄰又自二至上有師體故五曰侵伐上曰行師上六鳴謙利用行師征邑國上為亢位不得已而鳴謙坤有邑國之象雙湖胡氏曰謙卦下三爻皆吉而無凶上三爻皆利而無害易中吉利罕有若是純全者謙之效固如此然艮體稱吉而坤體稱利靜則多吉順則多利故也坤下震上豫利建侯行師自初至五有比體比為建國親侯又謙九三在三公之位自二至上有師體謙反而為豫則三升四四為諸侯有三公出封之象故利建侯然建侯以坤地靜鎮言行師以震雷威動言屯有震無坤則言建侯而不言行師謙有坤無震則言行師而不言建侯惟豫則兼言之也初六鳴豫凶小人得寵不勝其豫而發於聲音凶之道也初變為震又應震體震有鳴象六二介于石不終日貞吉互艮有石象艮伏兌上體互坎伏離離日在兌西終日也然皆伏於互體故有不終日之象夫六二上應隂柔逸豫之君下立乎鳴盱兩佞臣之間而以中正自守其處豫也介然如石其去豫也不待終日吉孰大焉諸爻皆言豫惟二五不然五貞疾不得豫也二貞吉不為豫也六三盱豫悔遲有悔睢盱視不審貌上體互坎伏離離目而震動故有盱象九四由豫大有得勿疑朋盍簪四為豫主豫之由也卦以陽為大九陽得位故曰大有得坤有朋之象衆隂從四故稱朋焉簪乃聚髮之物巽為寡髮則坤為髮矣而九四以陽聚之故有盍簪之象六五貞疾恆不死五溺於豫疾君也切近九四剛臣不敢自縱故曰貞疾其明皇之得韓休齊洋之得楊愔乎易言疾者五無妄之九五損之六四豐之六二兌之九四其疾皆可愈也惟豫之六五獨言貞疾然則人之生憂患而死安樂也豈不信哉五至三互坎坎為心病有貞疾之象上六冥豫成有渝無咎重隂故曰冥又互卦坎伏離離日也上變成巽巽入也日入於坤地有冥象居卦之上故曰成震動之終故曰有渝震下兌上隨元亨利貞無咎易中隨比相類故比曰元永貞無咎隨曰元亨利貞無咎屯臨無妄革皆言元亨利貞不言無咎惟隨則以無咎繼之蓋卦德動而恱易於不正而有咎也不正則隨伏艮巽而蠱生矣彖言無咎有深意焉按左傳穆薑筮得此卦卜史曰隨其出也君必速出薑曰隨元亨利貞有四德者隨而無咎我皆無之豈隨也哉遂薨於東宫初九官有渝貞吉出門交有功物有主之謂官內本坤卦以一隂上交乎乾為兌外本乾卦以一陽下交乎坤為震故曰官有渝初以陽居陽故曰貞二至四互艮有門象又四當兩卦之限門之地也初越四交五故曰出門交有功六二係小子失丈夫全卦本乾父坤母下體互艮為少男是四為小子也初震為長男上體互巽婦則初為丈夫也二以隂從陽初與四皆陽也豈能兼與之乎重隂無守故係四而失初巽為繩有係象故二三爻皆曰係六三係丈夫失小子隨有求得利居貞以六三視二四則二為小子四為丈夫矣二在下故孔子曰志舍下九四隨有獲貞凶有孚在道以明何咎豫隨九四皆大臣也豫有得即隨有獲也豫柔君在上四之志可以行故其戒在君而五貞疾隨剛君在上非四之所可犯故其戒在臣而四貞凶也居此位者貴於孚信故豫曰勿疑隨曰有孚云九五孚于嘉吉正配為嘉故婚禮謂之嘉禮二五正配也隨之諸爻各親其鄰惟五以中正應二之中正配之嘉者也四五以陽居三上二隂之間有中實之象故皆曰孚然四之孚戒之也欲其孚乎五也五之孚許之也喜其孚於二也上六拘係之乃從維之王用亨于西山上與三應三互艮巽艮為手拘之也巽為繩係之也下卦震伏巽乃從維之也兌西方之卦也艮為山有西山之象西山隂方也兌為巫所以祝祭而固結於隂幽者也上六重隂當西山之位九五王者而有孚信故曰王用亨于西山巽下艮上蠱元亨利涉大川先甲三日後甲三日卦變自泰來初上相易泰變而為蠱蠱者泰之壞也卦體巽伏震艮伏兌震動於下而兌説於上則蠱可飭矣故曰元亨震巽為木兌為澤故曰利涉大川易於蠱之彖辭獨言甲日者先天卦圖艮在西北巽在西南而甲木則在東方之離蠱由巽艮而成由甲逆數歷離震坤三位得艮先甲三日也自甲順數歷離兌乾三位得巽後甲三日也上艮下巽所以為蠱於艮得先甲三日之辛於巽得後甲三日之丁又所以治蠱也按左傳秦伯伐晉卜徒父筮得此卦曰千乘三去三去之餘獲其雄狐夫狐蠱必其君也蠱之貞風也其悔山也歲云秋矣我落其實而取其材所以克也實落材亡不敗何待三敗及韓晉戎還濘而止初六幹父之蠱有子考無咎厲終吉事壞於父而子幹之是父幸而有子考可以免咎曰父又曰考恐人疑父在而子幹也故稱考焉九二幹母之蠱不可貞六五有母象晉六二稱王母小過六二稱妣皆謂六五也九三幹父之蠱小有悔無大咎初陽位而濟之以柔故吉三陽位而益之以剛故小有悔六四裕父之蠱往見吝重隂寬順故不曰幹而曰裕三鋭而過故悔四緩而不及故吝三四當上下之際治亂興亡所繫也六五幹父之蠱用譽六五繼體之君故亦曰幹父之蠱下應九二賢臣二之陽剛得中所謂譽髦之士也五以柔中用之以幹蠱故曰用譽上九不事王侯高尚其事下五爻以父子言上爻以君臣言子之幹父猶臣之幹君也自初至五而蠱已去矣故上爻不言蠱蠱去則臣子之事畢全節而退臣子之高致也居卦之上故曰高尚兌下坤上臨元亨利貞至于八月有凶以陽臨隂有進而至於純乾之漸故曰元亨利貞八月有凶其説不一朱子曰八月謂自復卦一陽之月至於遁卦二隂之月隂長陽遁之時也然丑月卦為臨二陽浸長逼四隂至於八月建酉卦為觀則四隂逼二陽也所謂至於八月有凶者既言之於臨則當自臨數而不當自復數卦序以觀次臨則當數至觀而不當數至遁觀臨乃隂陽反對消息之常理豈可外引遁卦謂六月之遁為周之八月哉一説自坤之初六為復之初九與坤之六爻而七故復曰七日日陽也七與初皆陽也曰來復者聖人喜一陽之來復也自坤之六二為臨之九二與坤之六爻而八故臨曰八月月隂也八與二皆隂也曰有凶者聖人戒四隂之猶盛也一説歷臨六爻至遁六二凡八位八數為隂於象為月歷剝六爻至復初九凡七位七數為陽於象為日此即朱子意也一説復下震震少陽七數也位列於東是為日出之方臨下兊兊少隂八數也位列於西是為月出之方然於有凶之義無取也惟臨觀反對之説為是初九咸臨貞吉咸感之無心者也卦稱咸者山澤通氣也臨爻稱咸者隂陽相感也二陽俱曰咸臨謂協力以往即復彖朋來之義九二咸臨吉無不利初二俱咸臨初貞二無不利者初位卑而不中曰貞戒之也二得中而應君曰吉無不利勉之也六三甘臨無攸利既憂之無咎三以柔邪據二陽之上處兌之口有甘説臨人之象三變成泰泰三艱貞無咎臨三既憂之無咎易之慮君子而警小人也至矣六四至臨無咎下與初應誠心篤交故曰至臨蓋地澤依附臨之至也四當坤兌之間故有是象六五知臨大君之宜吉五居坤體故曰知臨五常之德智藏於內坤以藏之故有是象上六敦臨吉無咎坤艮皆土有敦厚之象臨曰敦臨艮曰敦艮謂土也然皆於卦終見之而復之五爻亦曰敦復者何也復上六迷復不能復者也非終復也六五為復之終有坤厚之德故稱敦復云坤下巽上觀盥而不薦有孚顒若二陽在上四隂觀之全卦艮體又自三至五互艮艮者止而未動有無為而化之義也艮為手有盥薦之象隂虛為有孚之象坤順為顒若之象上卦巽伏震震長子宗廟祭主也故以祭祀為辭初六童觀小人無咎君子吝隂居坤始所見不大如童稚然卦互艮為少男故曰童六二窺觀利女貞窺門中視也坤為闔户艮為門二柔居門户之內而觀乎外又二變為坎坎為隱伏有窺象故曰窺觀上巽體有女象故曰利女貞六三觀我生進退巽為進退三居上下之交可進可退當觀我之平生以卜其進退也六四觀國之光利用賓于王坤有國邑之象九五大觀在上為國之光四近而觀之利用賓于王古者諸侯朝王待以賓禮士未受祿亦謂之賓詩曰嘉賓周官曰以禮賓之是也按左傳陳敬仲之少也陳侯使周史筮得此爻曰是謂觀國之光利用賓于王此其代陳有國乎不在此其在異國非此其身在其子孫光逺而自他有耀者也坤土也巽風也乾天也風為天於土上山也有山之材而照之以天光於是乎居土上故曰觀國之光庭實旅百奉之以玉帛天地之美具焉利用賓于王其在後乎風行而著于土故曰其在異國乎若在異國必薑姓也薑太嶽之後也山嶽配天物莫能兩大陳衰此其昌乎及陳之初亡也陳桓子始大於齊其後亡也成子得政九五觀我生君子無咎九陽居尊表儀天下有君子之責五上皆言君子者觀之為卦取小人觀君子之義也陽為君子上九觀其生君子無咎我者內辭其者外辭五得位上不得位故爻義不同其下四隂皆以陽為觀法者故近者利而逺者吝焉震下離上噬嗑亨利用獄噬嗑除間之卦也卦互坎坎為律為棘有獄象六五柔中居坎之上故曰利用獄初九屨校滅趾無咎校木械也震為足屨校械其足也古用肉刑有斬左趾右趾之法故小懲大誡人知畏而不敢犯趾者動之初也當動之初用刑而遏絶之猶為小人之福故曰無咎六二噬膚滅鼻無咎膚者皮之表隂柔之象也六二柔中治獄平易有如噬膚而初九剛強必須深嚴乃為得中故曰滅鼻滅鼻劓刑也二至四互艮荀九家艮為鼻六三噬臘肉遇毒小吝無咎九四為間於一卦之中可謂臘肉而有毒者六三近之故曰遇毒六三以柔居剛九四以剛居柔肉取柔象臘取剛象也又自三至五互坎坎有毒象九四噬乾胏得金矢利艱貞吉離為乾卦故曰乾胏離為矢卦變自泰來乾為金故曰金矢六五噬乾肉得黃金貞厲無咎乾肉亦指九四卦變自泰來坤黃也乾金也又六五居上體之中噬九四之剛中為黃剛為金故有得黃金之象上九何校滅耳凶校在項曰何屨校不懲至於滅耳而凶自取之也滅耳刵刑也坎為耳卦互坎故有此象離下艮上賁亨小利有攸往卦自泰來泰有乾坤之體變為艮離之賁賁文也文物之雜也周官畫繪之事雜五色曰玄與黃相次又曰青與赤謂之文賁有乾坤之變乾天玄也坤地黃也離火赤也艮山青也故曰賁卦變上六之柔來文九二之剛是文雖柔而質剛又得中正故曰亨九二之剛上文上六之柔是文雖剛而質柔又非中正故曰小利有攸往隂為小上六是已初九賁其趾舍車而徒初九以陽剛之資秉文明之德而在下無位不能賁於天下惟飾其一身而已賁其趾者飾其身之所行也何以飾其所行惟義所在而已六二賢臣有乘車之貴初舍二之車而徒行以從六四之正應是所以賁趾者在此而不在彼故孔子曰義弗乘也初居卦下有趾象又六四互震震為足六二互坎有車象六二賁其須宋儒以須為鬚非也易以上為首初為尾正例也三居下卦之上亦得為角四居上卦之下亦得為尾變例也二在咸艮為腓在明夷為股非鬚之位若以賁趾為主則濡如皤如何謂哉須者待也初四相應而賁二與三五與上相近而賁六二柔中與五無應須待九三與之俱起故孔子曰與上興也二居互坎之下變則下卦成乾乾下坎上是為需需須也故曰賁其須九三賁如濡如永貞吉三居離上文極矣互坎為濡濡潤也言文之潤色者也詩曰六轡如濡亦言其光美而沃澤云爾六四賁如皤如白馬翰如匪寇婚媾皤白貌四變互巽巽為白故四上俱有白象下卦互坎上卦互震有馬象下體離也有飛翰之象四疑初之誘於車飾以從二而初乃舍車是四之婚媾也所以質素相賁白首不變其往應之心如馬之有飛翰速而決焉六五賁于丘園束帛戔戔吝終吉丘園間曠之地謂上九也五無應於下而賁於上故束帛戔戔帛五匹為束戔戔委積之貌此賁賢之禮也然徒豐其儀文而弗與其位則不免於吝上變成坤坤為帛為吝嗇故有是象上九白賁無咎白賁是所謂丘園之賢也昔者孔子筮得賁卦而不懌門人問之孔子不答蓋孔子欲為東周興起文治而此卦小利有攸往又六爻舍車須濡白馬白賁此孔子所以不懌也故終為素王然孔子雖不賁於當時而刪述之功則賁於萬世故曰文王既沒文不在兹乎其為賁也大矣坤下艮上剝不利有攸往剝有禠奪之義隂自下奪陽位而變其實也初六剝牀以足蔑貞凶牀者人之所安也卦體上實下虛有牀象初在卦下變則為震有足象六二剝牀以辨蔑貞凶辨幹也二爻為大臣之位國之幹也六二小人其剝大臣之君子而進為大臣者乎其當罷九齡相林甫之日乎卦以三四爻為人位二當人身之下牀足之上故有牀辨之象六三剝之無咎剝卦隂爻有五六三舍羣隂以應上九故無咎六五率羣隂以從上九故無不利初二四居剝之世專以隂剝陽者故皆因剝牀而凶六四剝牀以膚凶重隂居牀之上有膚象六五貫魚以宫人寵無不利五變為巽巽為魚為繩艮為手持繩下連衆隂有貫魚之象羣隂貫魚而進能如宫人之取寵不敢踰禮越分以干預權柄則無不利此開諭小人受福之道而致其戒也宫人衆妾也以之者王后也五為王后之位四為夫人三為九嬪二為世婦初為御妾又艮為門闕為閽寺而羣隂在艮之內有宫人之象或問説卦傳巽不為魚而筮卜之家人以巽為魚宋儒多從之何也曰以重卦離知之包犧結繩為網罟以佃以漁蓋取諸離離中有巽巽復有離巽為魚以漁也離為雉以佃也魚龍同氣東方靈蟲龍為之長震巽皆東方之木也震為龍木之正氣巽為魚木之廢氣故巽有魚象上九碩果不食君子得輿小人剝廬五陽已剝上九獨存如堅大之果不被蠧食則將墜於下而生於上矣五隂載一陽輿之象一陽覆五隂廬之象乾為木果艮得乾體故艮曰果蓏艮為萬物成始成終之卦有碩果不食之象輿坤象廬艮象也震下坤上復亨出入無疾朋來無咎反復其道七日來復利有攸往隂陽之反皆自內出非由外來剝極成坤陽降而入坤極而動陽升而出入其反也出其動也其出其入以漸而行故曰無疾朋陽類也一陽既復則二三四五六以次而來矣聖人喜陽之復於是計其復之數曰反復其道七日來復言陽剛之反而復其道自姤至此成數凡七而已臨曰八月有凶復曰七日來復陽消而數月冀其消之遲陽長而數日幸其長之速也按左傳晉厲公伐鄭鄭使告于楚晉楚遇於鄢陵厲公筮得此卦卜史曰吉其卦遇復南國蹙射其元王中厥目國蹙王傷不敗何待及戰果射共王中目初九不逺復無祇悔元吉初居卦始又在震初微動之時也當是時而能復則去無妄不逺矣故無祇悔元吉六二休復吉隂爻近陽得親賢之益剝六五近上故無不利復六二近初故休復吉而蒙四逺陽故困而吝也六三頻復厲無咎三在上下進退之間又居動體之極故曰頻復六四中行獨復四非二五何以稱中蓋中無定體三四為一卦之中又復五隂自二至上則四為中中行獨復謂處五隂之中而獨行以復也泰二夬五之中行二體之中也益三四之中行全體之中也復四之中行五隂之中也六五敦復無悔坤厚有敦象又五動互艮艮為篤實故曰敦上六迷復凶有災眚用行師終有大敗以其國君凶至于十年不克征坤為迷上居坤極先迷者也最逺於陽復歸無所故曰迷復上窮矣不可動動則降三成坎坎為災眚天災人眚凶之至也震為動坤為衆動衆有行師之象上居卦終與四五同體四為諸侯之位國也五君也又坤有國邑之象師敗而舉國以行其凶禍必及其國與其君矣十者坤之極數故屯頥互坤皆有十年之象夫復道貴先初為一卦之先四為上卦之先故初復不逺而四為獨復復道貴中故二休而五敦復道惡後三為下卦之後上為一卦之後故三厲而上之凶又甚焉易之戒深矣震上乾下無妄元亨利貞其匪正有眚不利有攸往無妄誠也誠者天之道也震得乾天之初未雜於物也故曰無妄九五剛中正變則不正而互坎坎為眚故曰其匪正有眚不利有攸往初九無妄往吉震陽初動誠一未分剛實無私動與天合故往吉六二不耕穫不災畬則利有攸往二動體而中正無妄者也故極言無妄可往之理初至五得益體有耕象震為稼艮為手二往之五五來應二二變成兌兌為毁折又卦有乾金銍刈其稼也有穫象二在地上為田一歲曰災三歲曰畬初九震足動田之始有災象五應二歷三爻有畬象耕穫災畬者望利者也六二無妄非耕而望穫災而望畬之類故利有攸往六三無妄之災或繫之牛行人之得邑人之災六三匪正上乾伏坤有牛象卦互艮巽艮為手巽為繩有繫牛之象震為大塗為足有行人之象坤有邑人之象六三無故得災譬有人繫牛於此舍而之他行路之人見其無主掠之而去彼繫牛者反責牛於邑人夫邑人未嘗竊牛也而受償牛之責是無妄之災也九四可貞無咎四剛無應可貞者可以堅守其正道不可輕動也九五無妄之疾勿藥有喜九五剛中無妄變則互坎坎有疾象又有毒藥之象然藥之治疾也施於豫之貞疾則可施於無妄之疾則不可故曰勿藥有喜上九無妄行有眚無攸利上九窮極貴乎守靜行則有眚也即彖辭之意卦變遁變而為無妄無妄變而為家人家人九三互坎上與三應故曰行有眚乾下艮上大畜利貞不家食吉利涉大川小畜以巽止乾巽弱乾壯故曰小畜大畜以艮止乾艮厚乾伏故曰大畜大畜之世當出而見用以濟天下之難二居內為家人卦變家人六二進而之五則為大畜三至上有頤體為食又下體互兌上艮伏兌兌口有食象故曰不家食吉兌為澤澤決為川上體互震木在乾健之前故曰利涉大川初九有厲利已初四隂陽正應何為有厲蓋四居艮體而止初以乾體而進兩不相合進則犯上故有厲而利於止也九二輿説輹輹輿下橫木也乾伏坤坤為輿故二三爻俱有輿象卦互震兌震木有輹象兌毁折有説輹之象九三良馬逐利艱貞曰間輿衛利有攸往乾為良馬震為作足之馬三陽並進良馬逐也九三剛健當位與上同德然馳逐不已必有奔蹶之患故戒以艱貞間習其輿衛則利有攸往輿者乘內之二陽也衛者防外之二隂也凡武備謂之衛考工記周人上輿有六等之數皆以衛名是輿亦可以稱衛也易之剛爻上進者遇柔則利遇剛則不利大壯之四曰壯于大輿之輹大畜之三曰良馬逐皆前遇柔也大壯之初曰征凶大畜之初曰有厲利已皆前遇剛也六四童牛之牿元吉四畜初九初居伏坤之始有童牛之象牿者施橫木於牛角以防其觸卦互震木有牿象六五豶豕之牙吉五畜九二二變互坎坎為豕五互震伏巽巽為白自三至上有頤體豕之頤中有剛且白者牙象也下乾為金互兌為毁折有豶豕之象豶者去其勢也豕之猛在牙豶其豕則牙猛不存矣五畜二而能乘其機以制其剛故有此象上九何天之衢亨三如良馬之逐上乃大其途而受之故聖人嘆曰是何天之衢路如此之亨乎幸之也艮為徑路又互震為大塗五為天位上居天之上故有天衢之象震下艮上頤貞吉觀頤自求口實艮震合體外實內虛有口象下動上止有飲食言語之象故曰頤頤中虛有離體離為目觀也觀人之所養必自求口實之處觀之口實不過言語飲食觀其貞否則足以知其所養是口實者觀頤之自也初九舍爾靈龜觀我朵頤頤有離體離為龜初伏於艮土之下龜蟄時也龜所以靈者蟄則咽息不動無求於外君子在下所養以正靈龜之類也初乃舍已應四是舍爾靈龜觀我而朵頤也初在動體頤動有朵象六二顛頤拂經于丘頤征凶初上二陽一卦之主初失已而凶上由頤而吉二三四五或顛或拂就養於下曰顛違其常理曰拂上卦艮為山山半為邱六五是也以五養二謂之邱頤于往也越也二居動體既求養於初而顛矣又欲越五之邱頤以從上九故征凶六三拂頤貞凶十年勿用無攸利就養於上故不曰顛然上為養主三雖正應而位不中正居動之極不以道義交於上而以口腹求於上故曰拂三互坤有十年之象六四顛頤虎視耽耽其欲逐逐無咎近君當位下交初九故曰顛然求賢自助故曰吉艮為虎四變成離離為目有虎視之象耽耽威重貌下交不瀆也久與賢人處則貪鄙之欲消逐逐消散之謂也震動而艮止有其欲逐逐之象六五拂經居貞吉不可涉大川五資上養可謂拂經艮體安靜故曰居貞吉五往居上上來居五則成坎坎為川下卦震也五變為巽本有舟楫涉川之具但六五隂柔在艮山之中又互坤地之上故曰不可涉大川上九由頤厲吉利涉大川上九一卦所由以頤者故曰由頤艮伏兌澤有川象上九以陽剛高出於大川之上而又有震木浮於下故有利涉大川之象巽下兑上大過棟橈利有攸往亨巽為木為長為高有棟象巽風撓萬物而體弱有棟橈之象又卦中四陽亦有棟象上下隂柔不能任亦有棟橈象也然二五剛中兌説而巽入故曰利有攸往亨初六藉用白茅無咎巽為白為草有白茅之象卦之全體有器象焉初隂為器之足上隂為器之口二三四五之陽則物之充實於器中者也卦以初二為地置器於地而用白茅以承藉之過於慎也故無咎九二枯楊生稊老夫得其女妻無不利兌為澤巽為木澤邉之木楊也荀九家亦以巽為楊虞仲翔曰稊稚也楊葉未舒也戴記夏小正篇曰正月桞稊釋者謂稊發芽也又按諸韻書皆以稊為木之秀而程朱獨以稊為根未詳所出蓋震卦為反生為蕃鮮巽體伏震故有枯楊生稊之象二互乾為老陽有老夫之象近巽之初有女妻之象夫二之取象在物則如枯楊再生稊在人則如老夫得女妻稊有敷榮之兆女有生育之端故無不利吁觀大過二五之爻見聖人立象盡意以效天下之動老夫得女妻再娶女之夫也老婦得士夫婦再嫁而夫未娶也人倫之變備於此矣九三棟橈凶卦以四陽為棟三四又當棟之中故二爻俱以棟言九三過剛不中上應兌體為毁折故有橈象九四棟隆吉有它吝以陽居隂剛柔相濟四變成坎坎於木為堅多心故曰棟隆九五枯楊生華老婦得其士夫無咎無譽枯楊生華無種植之理老婦得夫無生育之端無咎無譽者言不足咎不足譽也賤之也兌伏艮男有士夫之象互乾伏坤母有老婦之象上六過涉滅頂凶無咎中四爻互乾乾為首上六在首之上有頂象上六本遁之六二進而上行歷三四五至上為兌有兌澤滅頂之象坎下坎上習坎有孚維心亨行有尚彖於八純卦皆不稱習獨加習於坎者甚其險也使天下防其入而圖其出也一陽中實為有孚心亨之象二至四互震震足動於坎中為行有尚之象初六習坎入於坎窞凶初本臨之六五自外入重險而至於初有習坎之象在卦之下居坎之底有窞象蓋坎中小穴旁入者為窞坎卦上畫之柔象水旁兩岸下畫之柔象岸側小穴也初自外入故有入於坎窞之象九二坎有險求小得掩於一隂之下故曰有險出乎一隂之上故曰求小得六三來之坎坎險且枕入于坎窞勿用之往也乾之九三當二乾之間故曰終日乾乾坎之六三當二坎之間故曰來之坎坎枕藉也安也朱子曰枕者倚著未安之意陸希聲曰枕者閡礙險害之處非是竊謂三當坎坎之地當思所以出乎險也彼乃負隂柔之資不中不正遇此險也且以為安枕焉則終入於坎窞而凶矣險且枕即所謂安其危利其災者也卦互震艮震動故曰來之艮止故曰枕三變成巽巽入也故初三俱有入象六四樽酒簋二用缶納約自牖終無咎坎有酒象卦變自臨而來有坤體互卦得震艮艮鼻震足坤腹有樽簋之象坤艮為土坎伏離為大腹土器有腹者缶象也坤為闔戶艮為門坎為穴離為明穴其門戶以通明者牖象也六四德柔而近君九五剛中而求助剛柔相際可與有為是以一樽之酒二簋之食瓦缶之器以此自納於君而誠信固結有若盟約而不可解焉四變成兑兑為史巫故有盟約之象樽簋取交際之義牖取旁通之義缶取朴質之義卦以出險為功四雖居上卦之始然已出乎下坎之終而事君者又當始終不變故言終無咎以勉之九五坎不盈祇既平無咎隂掩乎上是水未溢出坎外僅能平乎坎耳互卦艮止有不盈既平之象上六係用徽纆置于叢棘三嵗不得凶上動成巽巽為繩有徽纆之象坎有叢棘之象巽木數三故曰三嵗坎卦自初至五是險中求出之人上六以隂居上是為險陷人者也天道好還陷人者至是受殃所以被係用徽用纆置于刑庭三嵗不得出也古者圜扉之外種九棘故曰叢棘離下離上離利貞亨畜牝牛吉離本坤體坤為子母牛荀九家曰離為牝牛牝牛至順之象畜牝牛者涵養至順也柔道也故言利貞而不言元也初九履錯然敬之無咎卦變自遁來有乾體三至五互兑體兑下乾上有履象二至四互巽巽為進退為不果巽伏震震為足初變成艮足動於前而艮止於上有履錯然之象錯然者謂其步趨紛亂不成行列也所以然者由於心之不敬故戒之曰敬之無咎六二黃離元吉二得坤之中爻故曰黃離當文明之世居大臣之位而能以謙柔之德體中正之道吉孰大焉九三日昃之離不鼓缶而歌則大耋之嗟凶離為日三在下卦之終有日昃之象卦本坤體坤為腹坤土有腹而出於離火之中有缶象三變互艮艮為手有鼓缶之象三變為震震為聲上互兑兑口出震聲有歌嗟之象離變而為革互乾為老陽有大耋之象夫日無不昃人無不耋理勢之常也三為死生所動不鼓缶而歌以為達則大耋之嗟以憂死故曰凶九四突如其來如焚如死如棄如此爻義峻辭嚴聖人立天下之大法也謂九四剛臣不能安分突然而來以侵逼乎柔中之五則受莫大之罪然易卦九四多矣獨言於離者離有相繼之嫌也古有焚刑刑人之喪不居兆域不序昭穆焚而棄之莽卓是已離為火有焚象六五出涕沱若戚嗟若吉兑澤流於離目有出涕之象離伏坎坎為心病有戚象兑為口有嗟若之象五柔為九四強臣所迫然得吉者以五上相麗耳五王上公可用出征以誅九四故孔子曰六五之吉離王公也上九王用出征有嘉折首獲匪其醜無咎居一卦之上有首象互兑為毁折有折首之象六五當王者之位用上九以出征有嘉美之意焉其要在於折敵之魁首不必盡獲其醜類也是以九四不敢突來而五得吉離為甲胄為戈兵故有出征之象易象鈎解卷二
