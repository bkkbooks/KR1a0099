body:
  text: 易象鈎解卷二明陳士元撰艮下坤上謙享君子有終六十四卦皆有凶悔吝惟謙六爻不然夫謙則無不亨然惟君子有終何也小人有假於其初者也九三人位爲謙之主故稱君子焉易以元亨利貞爲全德而謙辭獨言亨者蓋謙即元之善君子有終則利貞之義具矣初六謙謙君子用涉大川吉謙主九三故三爻與彖辭皆稱君子有終初六亦曰君子何也三勞而謙在上之君子也尊而光者也初謙而謙在下之君子也卑而不可踰者也皆所以爲君子之終用涉大川謂用此濟難可也况平居乎卦互震木坎水故曰涉川六二鳴謙貞吉鳴謙獨見於二上兩爻者三四五互震震爲聲有鳴象二上近之故曰鳴謙二重隂嫌於不正而承乘又皆君子其鳴也鳴其守正而不求應也九三勞謙君子有終吉三互坎坎爲勞卦故曰勞謙乾之三言君子坤之三言有終謙之三兼乾坤之占辭所謂勞者即終日乾乾或從王事而謙則􅅥厲含章者也六四无不利撝謙六四坤順重隂上近六五謙恭之君下賴九三勞謙之臣故无不利而四居危地又當撝揚其謙艮爲手有撝象六五不冨以其鄰利用侵伐无不利隂虚故曰不富凡人以財物周贍鄉里乃得其用六五柔尊能謙故不富而能以其鄰又自二至上有師體故五曰侵伐上曰行師上六鳴謙利用行師征邑國上爲亢位不得已而鳴謙坤有邑國之象雙湖胡氏曰謙卦下三爻皆吉而無凶上三爻皆利而無害易中吉利罕有若是純全者謙之效固如此然艮體稱吉而坤體稱利靜則多吉順則多利故也坤下震上豫利建侯行師自初至五有比體比爲建國親侯又謙九三在三公之位自二至上有師體謙反而爲豫則三升四四爲諸侯有三公出封之象故利建侯然建侯以坤地靜鎮言行師以震雷威動言屯有震無坤則言建侯而不言行師謙有坤無震則言行師而不言建侯惟豫則兼言之也初六鳴豫凶小人得寵不勝其豫而發於聲音凶之道也初變爲震又應震體震有鳴象六二介于石不終日貞吉互艮有石象艮伏兌上體互坎伏離離日在兌西終日也然皆伏於互體故有不終日之象夫六二上應隂柔逸豫之君下立乎鳴盱兩佞臣之間而以中正自守其處豫也介然如石其去豫也不待終日吉孰大焉諸爻皆言豫惟二五不然五貞疾不得豫也二貞吉不爲豫也六三盱豫悔遲有悔睢盱視不審貌上體互坎伏離離目而震動故有盱象九四由豫大有得勿疑朋盍簪四爲豫主豫之由也卦以陽爲大九陽得位故曰大有得坤有朋之象衆隂從四故稱朋焉簪乃聚髪之物巽爲寡髪則坤爲髪矣而九四以陽聚之故有盍簪之象六五貞疾恒不死五溺於豫疾君也切近九四剛臣不敢自縱故曰貞疾其明皇之得韓休齊洋之得楊愔乎易言疾者五无妄之九五損之六四豐之六二兌之九四其疾皆可愈也惟豫之六五獨言貞疾然則人之生憂患而死安樂也豈不信哉五至三互坎坎爲心病有貞疾之象上六㝠豫成有渝无咎重隂故曰㝠又互卦坎伏離離日也上變成巽巽入也日入於坤地有㝠象居卦之上故曰成震動之終故曰有渝震下兌上隨元亨利貞无咎易中隨比相類故比曰元永貞无咎隨曰元亨利貞无咎屯臨无妄革皆言元亨利貞不言无咎惟隨則以无咎繼之蓋卦德動而恱易於不正而有咎也不正則隨伏艮巽而蠱生矣彖言无咎有深意焉按左傳穆姜筮得此卦卜史曰隨其出也君必速出姜曰隨元亨利貞有四德者隨而无咎我皆无之豈隨也哉遂薨於東宫初九官有渝貞吉出門交有功物有主之謂官内本坤卦以一隂上交乎乾爲兌外本乾卦以一陽下交乎坤爲震故曰官有渝初以陽居陽故曰貞二至四互艮有門象又四當兩卦之限門之地也初越四交五故曰出門交有功六二係小子失丈夫全卦本乾父坤母下體互艮爲少男是四爲小子也初震爲長男上體互巽婦則初爲丈夫也二以隂從陽初與四皆陽也豈能兼與之乎重隂無守故係四而失初巽爲繩有係象故二三爻皆曰係六三係丈夫失小子隨有求得利居貞以六三視二四則二爲小子四爲丈夫矣二在下故孔子曰志舎下九四隨有獲貞凶有孚在道以明何咎豫隨九四皆大臣也豫有得即隨有獲也豫柔君在上四之志可以行故其戒在君而五貞疾隨剛君在上非四之所可犯故其戒在臣而四貞凶也居此位者貴於孚信故豫曰勿疑隨曰有孚云九五孚于嘉吉正配爲嘉故婚禮謂之嘉禮二五正配也隨之諸爻各親其鄰惟五以中正應二之中正配之嘉者也四五以陽居三上二隂之間有中實之象故皆曰孚然四之孚戒之也欲其孚乎五也五之孚許之也喜其孚於二也上六拘係之乃從維之王用亨于西山上與三應三互艮巽艮爲手拘之也巽爲繩係之也下卦震伏巽乃從維之也兌西方之卦也艮爲山有西山之象西山隂方也兌爲巫所以祝祭而固結於隂幽者也上六重隂當西山之位九五王者而有孚信故曰王用亨于西山巽下艮上蠱元亨利涉大川先甲三日後甲三日卦變自泰來初上相易泰變而爲蠱蠱者泰之壊也卦體巽伏震艮伏兌震動於下而兌說於上則蠱可飭矣故曰元亨震巽爲木兌爲澤故曰利涉大川易於蠱之彖辭獨言甲日者先天卦圖艮在西北巽在西南而甲木則在東方之離蠱由巽艮而成由甲逆數歴離震坤三位得艮先甲三日也自甲順數歴離兌乾三位得巽後甲三日也上艮下巽所以爲蠱於艮得先甲三日之辛於巽得後甲三日之丁又所以治蠱也按左傳秦伯伐晉卜徒父筮得此卦曰千乘三去三去之餘獲其雄狐夫狐蠱必其君也蠱之貞風也其悔山也歲云秋矣我落其實而取其材所以克也實落材亡不敗何待三敗及韓晉戎還濘而止初六幹父之蠱有子考无咎厲終吉事壊於父而子幹之是父幸而有子考可以免咎曰父又曰考恐人疑父在而子幹也故稱考焉九二幹母之蠱不可貞六五有母象晉六二稱王母小過六二稱妣皆謂六五也九三幹父之蠱小有悔无大咎初陽位而濟之以柔故吉三陽位而益之以剛故小有悔六四裕父之蠱往見吝重隂寛順故不曰幹而曰裕三銳而過故悔四緩而不及故吝三四當上下之際治亂興亡所繫也六五幹父之蠱用譽六五繼體之君故亦曰幹父之蠱下應九二賢臣二之陽剛得中所謂譽髦之士也五以柔中用之以幹蠱故曰用譽上九不事王侯高尚其事下五爻以父子言上爻以君臣言子之幹父猶臣之幹君也自初至五而蠱已去矣故上爻不言蠱蠱去則臣子之事畢全節而退臣子之高致也居卦之上故曰高尚兌下坤上臨元亨利貞至于八月有凶以陽臨隂有進而至於純乾之漸故曰元亨利貞八月有凶其說不一朱子曰八月謂自復卦一陽之月至於遯卦二隂之月隂長陽遯之時也然丑月卦爲臨二陽浸長逼四隂至於八月建酉卦爲觀則四隂逼二陽也所謂至於八月有凶者既言之於臨則當自臨數而不當自復數卦序以觀次臨則當數至觀而不當數至遯觀臨乃隂陽反對消息之常理豈可外引遯卦謂六月之遯爲周之八月哉一說自坤之初六爲復之初九與坤之六爻而七故復曰七日日陽也七與初皆陽也曰來復者聖人喜一陽之來復也自坤之六二爲臨之九二與坤之六爻而八故臨曰八月月隂也八與二皆隂也曰有凶者聖人戒四隂之猶盛也一說歴臨六爻至遯六二凡八位八數爲隂於象爲月歴剥六爻至復初九凡七位七數爲陽於象爲日此即朱子意也一說復下震震少陽七數也位列於東是爲日出之方臨下兊兊少隂八數也位列於西是爲月出之方然於有凶之義無取也惟臨觀反對之說爲是初九咸臨貞吉咸感之无心者也卦稱咸者山澤通氣也臨爻稱咸者隂陽相感也二陽俱曰咸臨謂恊力以往即復彖朋來之義九二咸臨吉无不利初二俱咸臨初貞二无不利者初位卑而不中曰貞戒之也二得中而應君曰吉无不利勉之也六三甘臨无攸利既憂之无咎三以柔邪據二陽之上處兌之口有甘說臨人之象三變成泰泰三艱貞无咎臨三既憂之无咎易之慮君子而警小人也至矣六四至臨无咎下與初應誠心篤交故曰至臨蓋地澤依附臨之至也四當坤兌之間故有是象六五知臨大君之宜吉五居坤體故曰知臨五常之德智藏於内坤以藏之故有是象上六敦臨吉无咎坤艮皆土有敦厚之象臨曰敦臨艮曰敦艮謂土也然皆於卦終見之而復之五爻亦曰敦復者何也復上六迷復不能復者也非終復也六五爲復之終有坤厚之德故稱敦復云坤下巽上觀盥而不薦有孚顒若二陽在上四隂觀之全卦艮體又自三至五互艮艮者止而未動有無爲而化之義也艮爲手有盥薦之象隂虚爲有孚之象坤順爲顒若之象上卦巽伏震震長子宗廟祭主也故以祭祀爲辭初六童觀小人无咎君子吝隂居坤始所見不大如童稚然卦互艮爲少男故曰童六二闚觀利女貞闚門中視也坤爲闔户艮爲門二柔居門户之内而觀乎外又二變爲坎坎爲隱伏有闚象故曰闚觀上巽體有女象故曰利女貞六三觀我生進退巽爲進退三居上下之交可進可退當觀我之平生以卜其進退也六四觀國之光利用賓于王坤有國邑之象九五大觀在上爲國之光四近而觀之利用賓于王古者諸侯朝王待以賓禮士未受禄亦謂之賓詩曰嘉賓周官曰以禮賓之是也按左傳陳敬仲之少也陳侯使周史筮得此爻曰是謂觀國之光利用賓于王此其代陳有國乎不在此其在異國非此其身在其子孫光逺而自他有耀者也坤土也巽風也乾天也風爲天於土上山也有山之材而照之以天光於是乎居土上故曰觀國之光庭實旅百奉之以玉帛天地之羙具焉利用賓于王其在後乎風行而著于土故曰其在異國乎若在異國必姜姓也姜太嶽之後也山嶽配天物莫能兩大陳衰此其昌乎及陳之初亡也陳桓子始大於齊其後亡也成子得政九五觀我生君子无咎九陽居尊表儀天下有君子之責五上皆言君子者觀之爲卦取小人觀君子之義也陽爲君子上九觀其生君子无咎我者内辭其者外辭五得位上不得位故爻義不同其下四隂皆以陽爲觀法者故近者利而逺者吝焉震下離上噬嗑亨利用獄噬嗑除間之卦也卦互坎坎爲律爲棘有獄象六五柔中居坎之上故曰利用獄初九屨校滅趾无咎校木械也震爲足屨校械其足也古用肉刑有斬左趾右趾之法故小懲大誡人知畏而不敢犯趾者動之初也當動之初用刑而遏絶之猶爲小人之福故曰无咎六二噬膚滅鼻无咎膚者皮之表隂柔之象也六二柔中治獄平易有如噬膚而初九剛强必須深嚴乃爲得中故曰滅鼻滅鼻劓刑也二至四互艮荀九家艮爲鼻六三噬腊肉遇毒小吝无咎九四爲間於一卦之中可謂腊肉而有毒者六三近之故曰遇毒六三以柔居剛九四以剛居柔肉取柔象腊取剛象也又自三至五互坎坎有毒象九四噬乾胏得金矢利艱貞吉離爲乾卦故曰乾胏離爲矢卦變自泰來乾爲金故曰金矢六五噬乾肉得黄金貞厲无咎乾肉亦指九四卦變自泰來坤黄也乾金也又六五居上體之中噬九四之剛中爲黄剛爲金故有得黄金之象上九何校滅耳凶校在項曰何屨校不懲至於滅耳而凶自取之也滅耳刵刑也坎爲耳卦互坎故有此象離下艮上賁亨小利有攸往卦自泰來泰有乾坤之體變爲艮離之賁賁文也文物之雜也周官畫繪之事雜五色曰𤣥與黄相次又曰青與赤謂之文賁有乾坤之變乾天𤣥也坤地黄也離火赤也艮山青也故曰賁卦變上六之柔來文九二之剛是文雖柔而質剛又得中正故曰亨九二之剛上文上六之柔是文雖剛而質柔又非中正故曰小利有攸往隂爲小上六是已初九賁其趾舎車而徒初九以陽剛之資秉文明之德而在下無位不能賁於天下惟飾其一身而已賁其趾者飾其身之所行也何以飾其所行惟義所在而已六二賢臣有乘車之貴初舎二之車而徒行以從六四之正應是所以賁趾者在此而不在彼故孔子曰義弗乘也初居卦下有趾象又六四互震震爲足六二互坎有車象六二賁其須宋儒以須爲鬚非也易以上爲首初爲尾正例也三居下卦之上亦得爲角四居上卦之下亦得爲尾變例也二在咸艮爲腓在明夷爲股非鬚之位若以賁趾爲主則濡如皤如何謂哉須者待也初四相應而賁二與三五與上相近而賁六二柔中與五無應須待九三與之俱起故孔子曰與上興也二居互坎之下變則下卦成乾乾下坎上是爲需需須也故曰賁其須九三賁如濡如永貞吉三居離上文極矣互坎爲濡濡潤也言文之潤色者也詩曰六轡如濡亦言其光羙而沃澤云爾六四賁如皤如白馬翰如匪㓂婚媾皤白貌四變互巽巽爲白故四上俱有白象下卦互坎上卦互震有馬象下體離也有飛翰之象四疑初之誘於車飾以從二而初乃舎車是四之婚媾也所以質素相賁白首不變其往應之心如馬之有飛翰速而決焉六五賁于丘園束帛戔戔吝終吉丘園閑曠之地謂上九也五無應於下而賁於上故束帛戔戔帛五匹爲束戔戔委積之貌此賁賢之禮也然徒豐其儀文而弗與其位則不免於吝上變成坤坤爲帛爲吝嗇故有是象上九白賁无咎白賁是所謂丘園之賢也昔者孔子筮得賁卦而不懌門人問之孔子不答盖孔子欲爲東周興起文治而此卦小利有攸往又六爻舎車須濡白馬白賁此孔子所以不懌也故終爲素王然孔子雖不賁於當時而删述之功則賁於萬世故曰文王既没文不在兹乎其爲賁也大矣坤下艮上剥不利有攸往剥有禠奪之義隂自下奪陽位而變其實也初六剥牀以足蔑貞凶牀者人之所安也卦體上實下虚有牀象初在卦下變則爲震有足象六二剥牀以辨蔑貞凶辨幹也二爻爲大臣之位國之幹也六二小人其剥大臣之君子而進爲大臣者乎其當罷九齡相林甫之日乎卦以三四爻爲人位二當人身之下牀足之上故有牀辨之象六三剥之无咎剥卦隂爻有五六三舎羣隂以應上九故无咎六五率羣隂以從上九故无不利初二四居剥之世專以隂剥陽者故皆因剥牀而凶六四剥牀以膚凶重隂居牀之上有膚象六五貫魚以宫人􅃂无不利五變爲巽巽爲魚爲繩艮爲手持繩下連衆隂有貫魚之象羣隂貫魚而進能如宫人之取􅃂不敢踰禮越分以干預權柄則无不利此開諭小人受福之道而致其戒也宫人衆妾也以之者王后也五爲王后之位四爲夫人三爲九嬪二爲世婦初爲御妾又艮爲門闕爲閽寺而羣隂在艮之内有宫人之象或問說卦傳巽不爲魚而筮卜之家人以巽爲魚宋儒多從之何也曰以重卦離知之包犧結繩爲網罟以佃以漁蓋取諸離離中有巽巽復有離巽爲魚以漁也離爲雉以佃也魚龍同氣東方靈蟲龍爲之長震巽皆東方之木也震爲龍木之正氣巽爲魚木之廢氣故巽有魚象上九碩果不食君子得輿小人剥廬五陽已剥上九獨存如堅大之果不被蠧食則將墜於下而生於上矣五隂載一陽輿之象一陽覆五隂廬之象乾爲木果艮得乾體故艮曰果蓏艮爲萬物成始成終之卦有碩果不食之象輿坤象廬艮象也震下坤上復亨出入无疾朋來无咎反復其道七日來復利有攸往隂陽之反皆自内出非由外來剥極成坤陽降而入坤極而動陽升而出入其反也出其動也其出其入以漸而行故曰无疾朋陽類也一陽既復則二三四五六以次而來矣聖人喜陽之復於是計其復之數曰反復其道七日來復言陽剛之反而復其道自姤至此成數凡七而已臨曰八月有凶復曰七日來復陽消而數月冀其消之遲陽長而數日幸其長之速也按左傳晋厲公伐鄭鄭使告于楚晉楚遇於鄢陵厲公筮得此卦卜史曰吉其卦遇復南國䠞射其元王中厥目國䠞王傷不敗何待及戰果射共王中目初九不逺復无祇悔元吉初居卦始又在震初微動之時也當是時而能復則去无妄不逺矣故无祇悔元吉六二休復吉隂爻近陽得親賢之益剥六五近上故无不利復六二近初故休復吉而蒙四逺陽故困而吝也六三頻復厲无咎三在上下進退之間又居動體之極故曰頻復六四中行獨復四非二五何以稱中盖中無定體三四爲一卦之中又復五隂自二至上則四爲中中行獨復謂處五隂之中而獨行以復也泰二夬五之中行二體之中也益三四之中行全體之中也復四之中行五隂之中也六五敦復无悔坤厚有敦象又五動互艮艮爲篤實故曰敦上六迷復凶有災眚用行師終有大敗以其國君凶至于十年不克征坤爲迷上居坤極先迷者也最逺於陽復歸無所故曰迷復上窮矣不可動動則降三成坎坎爲災眚天災人眚凶之至也震爲動坤爲衆動衆有行師之象上居卦終與四五同體四爲諸侯之位國也五君也又坤有國邑之象師敗而舉國以行其凶禍必及其國與其君矣十者坤之極數故屯頥互坤皆有十年之象夫復道貴先初爲一卦之先四爲上卦之先故初復不逺而四爲獨復復道貴中故二休而五敦復道惡後三爲下卦之後上爲一卦之後故三厲而上之凶又甚焉易之戒深矣震上乾下无妄元亨利貞其匪正有眚不利有攸往无妄誠也誠者天之道也震得乾天之初未雜於物也故曰无妄九五剛中正變則不正而互坎坎爲眚故曰其匪正有眚不利有攸往初九无妄往吉震陽初動誠一未分剛實無私動與天合故往吉六二不耕穫不菑畬則利有攸往二動體而中正无妄者也故極言无妄可往之理初至五得益體有耕象震爲稼艮爲手二往之五五來應二二變成兌兌爲毁折又卦有乾金銍刈其稼也有穫象二在地上爲田一歲曰菑三歲曰畬初九震足動田之始有菑象五應二歴三爻有畬象耕穫菑畬者望利者也六二无妄非耕而望穫菑而望畬之類故利有攸往六三无妄之災或繫之牛行人之得邑人之災六三匪正上乾伏坤有牛象卦互艮巽艮爲手巽爲繩有繫牛之象震爲大塗爲足有行人之象坤有邑人之象六三無故得災譬有人繫牛於此舎而之他行路之人見其無主掠之而去彼繫牛者反責牛於邑人夫邑人未嘗竊牛也而受償牛之責是无妄之災也九四可貞无咎四剛無應可貞者可以堅守其正道不可輕動也九五无妄之疾勿藥有喜九五剛中无妄變則互坎坎有疾象又有毒藥之象然藥之治疾也施於豫之貞疾則可施於无妄之疾則不可故曰勿藥有喜上九无妄行有眚无攸利上九窮極貴乎守静行則有眚也即彖辭之意卦變遯變而爲无妄无妄變而爲家人家人九三互坎上與三應故曰行有眚乾下艮上大畜利貞不家食吉利涉大川小畜以巽止乾巽弱乾壯故曰小畜大畜以艮止乾艮厚乾伏故曰大畜大畜之世當出而見用以濟天下之難二居内爲家人卦變家人六二進而之五則爲大畜三至上有頤體爲食又下體互兌上艮伏兌兌口有食象故曰不家食吉兌爲澤澤決爲川上體互震木在乾健之前故曰利涉大川初九有厲利已初四隂陽正應何爲有厲蓋四居艮體而止初以乾體而進兩不相合進則犯上故有厲而利於止也九二輿說輹輹輿下横木也乾伏坤坤爲輿故二三爻俱有輿象卦互震兌震木有輹象兌毁折有說輹之象九三良馬逐利艱貞曰閑輿衛利有攸往乾爲良馬震爲作足之馬三陽並進良馬逐也九三剛健當位與上同德然馳逐不已必有奔蹶之患故戒以艱貞閑習其輿衛則利有攸往輿者乘内之二陽也衛者防外之二隂也凡武備謂之衛考工記周人上輿有六等之數皆以衛名是輿亦可以稱衛也易之剛爻上進者遇柔則利遇剛則不利大壯之四曰壯于大輿之輹大畜之三曰良馬逐皆前遇柔也大壯之初曰征凶大畜之初曰有厲利已皆前遇剛也六四童牛之牿元吉四畜初九初居伏坤之始有童牛之象牿者施横木於牛角以防其觸卦互震木有牿象六五豶豕之牙吉五畜九二二變互坎坎爲豕五互震伏巽巽爲白自三至上有頤體豕之頤中有剛且白者牙象也下乾爲金互兌爲毁折有豶豕之象豶者去其勢也豕之猛在牙豶其豕則牙猛不存矣五畜二而能乘其機以制其剛故有此象上九何天之衢亨三如良馬之逐上乃大其途而受之故聖人嘆曰是何天之衢路如此之亨乎幸之也艮爲徑路又互震爲大塗五爲天位上居天之上故有天衢之象震下艮上頤貞吉觀頤自求口實艮震合體外實内虚有口象下動上止有飲食言語之象故曰頤頤中虚有離體離爲目觀也觀人之所養必自求口實之處觀之口實不過言語飲食觀其貞否則足以知其所養是口實者觀頤之自也初九舎爾靈龜觀我朶頤頤有離體離爲龜初伏於艮土之下龜蟄時也龜所以靈者蟄則咽息不動無求於外君子在下所養以正靈龜之類也初乃舎已應四是舎爾靈龜觀我而朶頤也初在動體頤動有朶象六二顛頤拂經于丘頤征凶初上二陽一卦之主初失已而凶上由頤而吉二三四五或顛或拂就養於下曰顛違其常理曰拂上卦艮爲山山半爲邱六五是也以五養二謂之邱頤于往也越也二居動體既求養於初而顛矣又欲越五之邱頤以從上九故征凶六三拂頤貞凶十年勿用无攸利就養於上故不曰顛然上爲養主三雖正應而位不中正居動之極不以道義交於上而以口腹求於上故曰拂三互坤有十年之象六四顛頤虎視眈眈其欲逐逐无咎近君當位下交初九故曰顛然求賢自助故曰吉艮爲虎四變成離離爲目有虎視之象眈眈威重貌下交不瀆也久與賢人處則貪鄙之欲消逐逐消散之謂也震動而艮止有其欲逐逐之象六五拂經居貞吉不可涉大川五資上養可謂拂經艮體安靜故曰居貞吉五往居上上來居五則成坎坎爲川下卦震也五變爲巽本有舟楫涉川之具但六五隂柔在艮山之中又互坤地之上故曰不可涉大川上九由頤厲吉利涉大川上九一卦所由以頤者故曰由頤艮伏兌澤有川象上九以陽剛高出於大川之上而又有震木浮於下故有利涉大川之象巽下兑上大過棟橈利有攸往亨巽爲木爲長爲高有棟象巽風撓萬物而體弱有棟橈之象又卦中四陽亦有棟象上下隂柔不能任亦有棟橈象也然二五剛中兌說而巽入故曰利有攸往亨初六藉用白茅无咎巽爲白爲草有白茅之象卦之全體有器象焉初隂爲器之足上隂爲器之口二三四五之陽則物之充實於器中者也卦以初二爲地置器於地而用白茅以承藉之過於慎也故无咎九二枯楊生稊老夫得其女妻无不利兌爲澤巽爲木澤邉之木楊也荀九家亦以巽爲楊虞仲翔曰稊穉也楊葉未舒也戴記夏小正篇曰正月桞稊釋者謂稊發芽也又按諸韻書皆以稊爲木之秀而程朱獨以稊爲根未詳所出蓋震卦爲反生爲蕃鮮巽體伏震故有枯楊生稊之象二互乾爲老陽有老夫之象近巽之初有女妻之象夫二之取象在物則如枯楊再生稊在人則如老夫得女妻稊有敷榮之兆女有生育之端故無不利吁觀大過二五之爻見聖人立象盡意以效天下之動老夫得女妻再娶女之夫也老婦得士夫婦再嫁而夫未娶也人倫之變備於此矣九三棟橈凶卦以四陽爲棟三四又當棟之中故二爻俱以棟言九三過剛不中上應兌體爲毁折故有橈象九四棟隆吉有它吝以陽居隂剛柔相濟四變成坎坎於木爲堅多心故曰棟隆九五枯楊生華老婦得其士夫无咎无譽枯楊生華無種植之理老婦得夫無生育之端无咎无譽者言不足咎不足譽也賤之也兌伏艮男有士夫之象互乾伏坤母有老婦之象上六過涉滅頂凶无咎中四爻互乾乾爲首上六在首之上有頂象上六本遯之六二進而上行歴三四五至上爲兌有兌澤滅頂之象坎下坎上習坎有孚維心亨行有尚彖於八純卦皆不稱習獨加習於坎者甚其險也使天下防其入而圖其出也一陽中實爲有孚心亨之象二至四互震震足動於坎中爲行有尚之象初六習坎入於坎窞凶初本臨之六五自外入重險而至於初有習坎之象在卦之下居坎之底有窞象蓋坎中小穴旁入者爲窞坎卦上畫之柔象水旁兩岸下畫之柔象岸側小穴也初自外入故有入於坎窞之象九二坎有險求小得掩於一隂之下故曰有險出乎一隂之上故曰求小得六三來之坎坎險且枕入于坎窞勿用之往也乾之九三當二乾之間故曰終日乾乾坎之六三當二坎之間故曰來之坎坎枕藉也安也朱子曰枕者倚着未安之意陸希聲曰枕者閡礙險害之處非是竊謂三當坎坎之地當思所以出乎險也彼乃負隂柔之資不中不正遇此險也且以爲安枕焉則終入於坎窞而凶矣險且枕即所謂安其危利其菑者也卦互震艮震動故曰來之艮止故曰枕三變成巽巽入也故初三俱有入象六四樽酒簋貳用缶納約自牖終无咎坎有酒象卦變自臨而來有坤體互卦得震艮艮鼻震足坤腹有樽簋之象坤艮爲土坎伏離爲大腹土器有腹者缶象也坤爲闔戸艮爲門坎爲穴離爲明穴其門戸以通明者牖象也六四德柔而近君九五剛中而求助剛柔相際可與有爲是以一樽之酒二簋之食瓦缶之器以此自納於君而誠信固結有若盟約而不可解焉四變成兑兑爲史巫故有盟約之象樽簋取交際之義牖取旁通之義缶取樸質之義卦以出險爲功四雖居上卦之始然已出乎下坎之終而事君者又當始終不變故言終無咎以勉之九五坎不盈祇既平无咎隂掩乎上是水未溢出坎外僅能平乎坎耳互卦艮止有不盈既平之象上六係用徽纆寘于叢棘三嵗不得凶上動成巽巽爲繩有徽纆之象坎有叢棘之象巽木數三故曰三嵗坎卦自初至五是險中求出之人上六以隂居上是爲險䧟人者也天道好還䧟人者至是受殃所以被係用徽用纆寘于刑庭三嵗不得出也古者圜扉之外種九棘故曰叢棘離下離上離利貞亨畜牝牛吉離本坤體坤爲子母牛荀九家曰離爲牝牛牝牛至順之象畜牝牛者涵養至順也柔道也故言利貞而不言元也初九履錯然敬之无咎卦變自遯來有乾體三至五互兑體兑下乾上有履象二至四互巽巽爲進退爲不果巽伏震震爲足初變成艮足動於前而艮止於上有履錯然之象錯然者謂其歩趨紛亂不成行列也所以然者由於心之不敬故戒之曰敬之无咎六二黄離元吉二得坤之中爻故曰黄離當文明之世居大臣之位而能以謙柔之德體中正之道吉孰大焉九三日昃之離不鼔缶而歌則大耋之嗟凶離爲日三在下卦之終有日昃之象卦本坤體坤爲腹坤土有腹而出於離火之中有缶象三變互艮艮爲手有鼓缶之象三變爲震震爲聲上互兑兑口出震聲有歌嗟之象離變而爲革互乾爲老陽有大耋之象夫日無不昃人無不耋理勢之常也三爲死生所動不鼔缶而歌以爲達則大耋之嗟以憂死故曰凶九四突如其來如焚如死如棄如此爻義峻辭嚴聖人立天下之大法也謂九四剛臣不能安分突然而來以侵偪乎柔中之五則受莫大之罪然易卦九四多矣獨言於離者離有相繼之嫌也古有焚刑刑人之喪不居兆域不序昭穆焚而棄之莽卓是已離爲火有焚象六五出涕沱若戚嗟若吉兑澤流於離目有出涕之象離伏坎坎爲心病有戚象兑爲口有嗟若之象五柔爲九四强臣所迫然得吉者以五上相麗耳五王上公可用出征以誅九四故孔子曰六五之吉離王公也上九王用出征有嘉折首獲匪其醜无咎居一卦之上有首象互兑爲毁折有折首之象六五當王者之位用上九以出征有嘉美之意焉其要在於折敵之魁首不必盡獲其醜類也是以九四不敢突來而五得吉離爲甲胄爲戈兵故有出征之象易象鈎解卷二
