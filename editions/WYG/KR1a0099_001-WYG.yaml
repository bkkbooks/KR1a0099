body:
  text: 易象鈎解卷一明陳士元撰乾下乾上乾元亨利貞卦彖元亨利貞者六乾屯隨臨无妄革也孔子彖傳屯隨皆曰大亨貞无妄革皆曰大亨以正惟乾四德與他卦異乾天也元亨利貞其春秋王者法天之義與初九潛龍勿用震爲龍乾自震變故六爻稱龍龍鱗八十一有九九之數焉初變爲巽巽伏也故曰潛龍九二見龍在田利見大人重卦初二爲地三四爲人五上爲天二在地表故曰田二變爲離離爲文明爲目故曰見龍易以陽爲大隂爲小九陽也以三畫之卦言則二五爲人位故二五皆曰大人按左傳昭公二十九年秋龍見於絳郊魏獻子問於蔡墨對曰乾之九二變也九三君子終日乾乾夕􅅥若厲无咎三居人位故曰君子三變爲兊互離兊西也離日也日在西終日也乾乾天理不息也下乾終而上乾繼之故曰乾乾三陽位二四隂位有坎象焉坎爲加憂故曰夕􅅥若九四或躍在淵无咎淵坎也自四至上自二至四皆陽位䧟於隂位之中有重坎之象重坎爲淵四本震體震動也故曰躍在淵者涵養深也或躍者試所養也四淵而九躍爻不稱龍疑於五也進退不茍故无咎九五飛龍在天利見大人五居天位五變成離離爲飛故曰飛龍在天上九亢龍有悔上變成兊兊爲毁折亢滿之累也用九見羣龍无首吉乾爲首九變是龍无首也不曰六龍而曰見羣龍以下五爻言也卦以上爻爲首羣龍无上之亢是无首矣不亢則无悔故曰吉或問孔子曰時乘六龍何也曰聖人非乘上之亢也知進退存亡而不失其正乘上之龍也坤下坤上坤元亨利牝馬之貞君子有攸往先迷後得主利西南得朋東北喪朋安貞吉乾爲馬坤變爲牝馬坤之元亨利三德同乎乾惟貞則獨指一事曰牝馬之貞者坤以順爲貞也臣道也君子往而先焉君未信也所向必迷惟後其君而應之則得其所主乃爲利矣故文言曰後得主而有常有常者臣之利也西南兌離巽隂方也東北震坎艮陽方也往西南雖得其類然兌說離麗巽伏或䧟於邪矣往東北雖喪其朋然震動艮止坎剛中以濟之必得其貞安於貞則吉也初六履霜堅冰至坤自剥來剥九月之卦也九月白露爲霜履霜而知堅冰至者見㣲也聖人愛君子而憂小人乾初勿用慮其始也坤初堅冰防其終也嗚乎易狀小人之情備矣霜冰言慘烈也鼠言貪也戎㓂言暴也狐言惑媚也乘言僭也拇言依附也隼言悍鷙也𤓰言滋蔓也六二直方大不習无不利乾爲直爲大坤爲方六二純坤動而爲乾故曰直方大習重也脩也不習言不假重􅃨脩爲也六三含章可貞或從王事无成有終初三陽位二隂位有離體故曰章又六三以陽居隂隂陽相錯而成章也坤德静翕故曰含章或者不必然之辭也乾九四陽居隂坤六三隂居陽皆在二卦進退之間故皆曰或下卦之終故曰有終六四括囊无咎无譽坤爲囊隂虚能受有囊象六四重隂吝嗇有括象孔頴達曰囊所以貯物以譬心藏知也閉其知而不用故曰括囊功不顯物故曰无譽不與物忤故曰无咎六五黄裳元吉黄象五之中裳象六之隂乾爲衣而坤爲裳以配之坤之色黄故曰黄裳左傳南蒯之占本義備矣上六龍戰于野其血𤣥黄上在卦外故曰野坤十月卦也乾位西北亦當十月之交隂窮於陽必戰故說卦曰戰乎乾不曰隂戰而曰龍戰以陽爲主也血隂也戰稱龍傷稱血扶陽抑隂之義也夫上之龍戰已兆於初之履霜矣可畏也哉用六利永貞用六則坤變爲乾止得乾之利貞而已陽全而隂半也震下坎上屯元亨利貞勿用有攸往利建侯屯豫皆言建侯二卦皆有震震長子震驚百里有侯象焉屯初爲震之主震動故元亨遇坎故利貞勿用者非不往也不可輕用以往也初九磐桓利居貞利建侯磐大石也艮爲石三四五互艮有磐象磐桓於前屯難之未可移者也震體輕動故戒以利居貞初變成比比有建侯之象按左傳衛襄公夫人姜氏無子嬖人婤生孟縶又生元孟縶之足不良弱行孔成子筮立元遇屯又筮立縶遇屯初九史朝曰立元何疑焉其繇曰利建侯嗣吉何建建非嗣也孔成子遂立元是爲靈公又畢萬筮仕於晉遇屯初九辛廖占之曰吉孰大焉其必蕃昌公侯之卦也六二屯如邅如乘馬班如匪㓂婚媾女子貞不字十年乃字班别也下馬爲班震爲足乾變震爲作足之馬故曰乘馬六二乘馬應五而逼於初九故邅迴不進與馬别處也子夏曰班如者相連不進也二變成兌兌爲少女故曰女子互坤坤爲年其數十故曰十年馬季長曰重婚爲媾六三即鹿无虞惟入于林中君子幾不如舎往吝震木在下有林中之象離爲佃漁虞人之象也坎在前離之反也故曰无虞鹿陽物謂初九之建侯也三變成巽巽爲入故曰入於林中互艮艮止也故曰不如舎三傑從漢因虞得鹿也項羽霸楚即鹿无虞也知此幾者其惟君子哉六四乘馬班如求婚媾往吉无不利婚媾求助之謂隂陽相濟之情也初來求四男下女也故曰吉利九五屯其膏小貞吉大貞凶坎爲膏澤五變成坤坤嗇吝故曰屯其膏上六乘馬班如泣血漣如震坎皆有馬象二四上皆重隂故皆曰乘馬班如二班如待五應也四班如待初應也上六无應但憂懼而已坎爲血爲加憂故曰泣血漣如坎下艮上蒙亨匪我求童蒙童蒙求我初筮告再三瀆瀆則不告利貞蒙幼也非蒙昧也如蒙昧也何以亨乎伊川以童蒙爲六五蓋五是艮男故爲童二是坎男故爲我艮爲手互震爲草以手揲草筮也初筮誠也再三瀆瀆則不告非終不告也待其誠而後告不輕告也初六發蒙利用刑人用說桎梏以往吝坎爲桎梏初蒙易發惟發蒙者正其身以儀刑之則迷覺蔽解如桎梏之得脫也過此以往則吝矣夫人心有私欲如罪人之有桎梏莊子所謂解其桎梏與此同意九二包蒙吉納婦吉子克家上下四隂蒙也二五隂陽相應五婦也二隂位隂虚能受有包納之象坎爲乾子五位至尊父也二承之九剛能任有克家之象包蒙納婦皆子之所以克家者也震長男故屯初爲建侯坎中男艮少男故蒙二爲克家之子五爲童蒙云六三勿用取女見金夫不有躬无攸利乾再索得坎乾爲金坎中男爲夫坎伏離離目爲見故曰見金夫三不中正舎上九正應而見九二之金夫三至五互坤坤爲躬坎䧟失其躬故曰不有躬六四困蒙吝居艮之下止而不進又以重隂逺於二陽困蒙之象也艮伏兌兌上坎下爲困故曰困蒙六五童蒙吉五之吉也其太甲得伊尹成王得周公者乎上九擊蒙不利爲冦利禦㓂艮爲手故曰擊坎爲盗故曰㓂人心之蒙㓂也上居蒙極九爲陽窮蒙未易發故必擊而禦之乾下坎上需有孚光亨貞吉利涉大川乾坤之後繼以坎險者六卦險動爲屯險止爲蒙健險爲需險健爲訟行險而順爲師有坎而無險爲比乾坤開闢即有險難自屯至比皆聖王濟險之業而必曰需者王道無近功也乾坎中實爲孚又卦變三往居上爲中孚故曰有孚坎水互離故曰光曰大川初九需于郊利用恒无咎三陽需險以逺近爲難易郊去水最逺乾之遊魂爲坤坤爲郊初二俱變則爲蹇山水之間有沙故二爻曰沙三變爲節水澤之間有泥故三爻曰泥九二需于沙小有言終吉互兌少女爲小口舌爲言又荀九家以乾爲言九三需于泥致㓂至需與漸皆有待義需于郊于沙于泥由平原而水際水際非人所安也漸于干于磐于陸由水際而平原平原非鴻所安也皆以三爲危地需三近坎故曰㓂至漸三互坎故曰禦㓂坎爲盜不其然乎六四需于血出自穴穴者隂窟坎象也坎爲血卦四在坎初而居乾之上又與初應故能出焉九五需于酒食貞吉此無爲之治也酒食坎象上六入于穴有不速之客三人來敬之終吉坎上下二隂皆曰穴四出而上入者四體柔正上居坎終也三人謂乾之三陽相需而進來不速也上六敬以待之賴以濟險故終吉坎下乾上訟有孚窒􅅥中吉終凶利見大人不利涉大川二五中實又卦變初往居四爲中孚故曰有孚遯九三下而為訟故曰窒窒下塞也九三艮土下塞乎坎也坎爲加憂故曰􅅥二五爲中上爲終五爲大人坎爲大川乾在下則進而出故利涉乾在上則退而入故不利涉此需訟之異也初六不永所事小有言終吉不曰不永訟而曰不永所事事之初猶幸其不成訟也初變成兌故曰小有言九二不克訟歸而逋其邑人三百户无眚五爲君乾爲父臣子豈能訟君父哉故曰不克訟坎爲隱伏故曰逋二變成坤坤爲户二居大夫位爲邑盖古者諸侯建國大夫受邑諸侯之下士視上農夫食九人中士倍下士上士倍中士大夫倍上士卿四大夫君十卿禄天子之大夫視子男大國之卿視小國之君諸侯之卿視天子之大夫食二百八十有八人三百户舉全數也坎爲多眚變坤故无眚六三食舊德貞厲終吉或從王事无成古者稱德而受禄食舊德保禄位也三䖏兩剛之間近而不相得故曰厲三在大臣之位本當從王但隂柔不争故曰或曰无成與坤之三爻相似九四不克訟復即命渝安貞吉二四皆不克訟二識時勢能歸而安於分之小四明義理能渝而安於命之正聖人喜人改過如此九五訟元吉九五訟主其訟獄歸舜虞芮質文者乎上九或錫之鞶帶終朝三褫之或設辭也上九過剛終訟設若訟勝而得鞶帶之錫亦終朝三褫之甚言訟之不可終也鞶大帶也乾衣坤裳坎卦陽畫横列於坤體之中有鞶帶之象上變成兌兌爲附决有或錫或禠之象下體互離爲晝有終朝之象卦變上九自大過九三而來故曰三禠言奪之者衆也坎下坤上師貞丈人吉无咎彖之丈人即爻之長子指九二也惟黃髮之尚父元老之方叔足以當之初六師出以律否臧凶律度量衡之法皆起於黃鍾之九寸黃鍾坎位也爾雅曰坎律銓也律者節制之謂師雖有律而出無名則不善而凶矣况出不以正者乎按左傳晉師救鄭及河聞鄭及楚平彘子以中軍濟知莊子曰此師殆哉周易有之師出以律否臧凶順成爲律逆爲否也後彘子果敗九二在師中吉无咎王三錫命二剛中而統衆隂有帥師之象二曰王三錫命五應也五曰長子帥師二應也二互震震木數三故曰三錫言優禮之極也六三師或輿尸凶坤爲輿坎於輿爲多眚三不中正居坎之上坤之下故曰輿尸六四師左次无咎兵家尚右右爲前左爲後故八陣圖前衝在右後衝在左師三宿爲次左次退舎也重隂故不能進六五田有禽利執言无咎長子帥師弟子輿尸貞凶坤體再索得離有田獵禽鳥之象故曰田有禽六五君位興師之主三曰師或輿尸危之之辭而不忍必言也五曰弟子輿尸蓋五既用二而又用三其凶必矣二互震故曰長子五變互艮爲手爲少男故曰執曰弟子上六大君有命開國承家小人勿用坤爲土爲國邑王三錫命行師之始也大君有命行師之終也彖言丈人年德俱尊之謂爻言小人言弟子小人無德而弟子則年少不更事者故曰貞凶曰勿用深致戒焉坤下坎上比吉原筮元永貞无咎不寧方來後夫凶卦體三至五互艮卦變自復而來下卦震也有艮手持震草之象故曰筮原筮者推原前之所筮再筮之謂也蒙之筮問人者也不一則不專比之筮自考者也不再則不審坎勞卦也故曰不寧坤爲方朱子曰有不安者皆來歸之是不寧之方皆來比也後夫者後比之人也或曰如妻從後夫鑿矣初六有孚比之无咎有孚盈缶終來有他吉易言有孚者二十三有取隂畫者中虚孚之本也有取陽畫者中實孚之質也缶者中虚樸素之象坤爲腹而有容隂居坤下故曰缶坤伏乾而充實故曰盈缶六二比之自内貞吉二在内卦外比九五其外比也由其内有中正之德故曰比之自内六三比之匪人上六无首是爲匪人六四外比之貞吉四應初而承乎五初在内卦五在外卦舎初比五故曰外比九五顯比王用三驅失前禽邑人不誡吉九五陽明故稱顯比坎伏離離爲網罟有三驅之象上六在前變則成巽有禽象五居王位故曰王用三驅失前禽坤爲邑五隂比陽有邑人比王之象巽有申命之義誡也五變則純坤靜黙故曰不誡夫師比二卦相反而五爻俱言禽一執一舎仁義並行而不悖此之謂王者之田上六比之无首凶上爲首无首即彖所謂後夫也四隂皆從五而已獨後焉下則棄於四隂之類上則絶於一陽之君能无凶乎乾下巽上小畜亨密雲不雨自我西郊坎爲雲爲雨三至五互離伏坎有密雲不雨之象二至四互兌兌西方也乾伏坤坤爲郊有西郊之象夫密雲何以不雨也隂陽和而後雨密雲隂氣西郊隂方又巽爲東南之風以散之而離日已在乾天之上故曰不雨上爻言雨變坎故也初九復自道何其咎吉卦變自姤而來姤之四復爲初同人之五復爲二又巽伏震乾伏坤震坤爲復復自道者反本位而行正道不爲隂所畜也初二不受畜故皆言復三受畜故不言復焉九二牽復吉初安於復故自復二勉於復故牽復二牽五攣皆取畜義九三輿說輻夫妻反目伏坤爲輿巽木有輻象互兌爲毁折輿脫輻矣大畜九三應艮之陽也故曰日閑輿衞利有攸往小畜九三近巽之隂也故曰輿說輻輻之脫也不閑輿之過也豈能利往哉三四剛柔有夫妻之象上下卦體兩相分隔又乾爲老夫巽爲長妻以巽畜乾夫妻乖戾又互離爲目巽爲多白眼三欲上進剛而不中見畜而怒有反目之象六四有孚血去􅅥出无咎坎爲血卦爲加憂血者陽傷隂之象􅅥者隂憂陽之象互離中虚有中孚之象四孚於五臣孚君也故血去􅅥出九五有孚攣如富以其鄰六四九五隂陽各得其位故皆有孚攣者手相挽也五變成艮艮爲手故曰攣如陽實爲富鄰謂衆陽夫衆陽强健九五以剛明中正之君而行巽順柔克之政使衆陽孚信攣固翻然而爲善也故曰冨以其鄰上九旣雨旣處尚德載婦貞厲月幾望君子征凶上以巽畜乾三既脫輻則畜道成矣既者已然之辭前之不雨者旣雨矣不處者旣處矣豈非巽德積滿所致乎夫巽本隂也積而成陽聖人有憂焉故曰厲曰凶巽爲長女婦也上變成坎坎爲雨故曰旣雨坎䧟也故曰旣處坎爲月月遇乾有幾望之象卦互離兌離日也兌西也巽伏震震東也坎月在震東離日在兌西是日月東西相望也故曰月幾望兌下乾上履虎尾不咥人亨按京氏易傳履自艮卦而入世在九五積算起庚子星位起熒惑卦氣候六丙宿位降壬申卦之吉凶考於三爻之升降止於四夫京房之學授受有自而易傳存其槩耳今之學士大夫擯棄不取曰京氏專卜筮也嗚呼使四聖不因卜筮而作易惟欲立言垂訓則畫卦揲蓍也何爲哉朱子曰易之取象固必有所自來而其爲說必已具於太卜之官顧今不可復考則姑闕之亦不可謂象爲假設而遂忘之也然則京氏之學安知非太卜之所藏者耶履自艮入艮爲虎庚子震之始也震動爲履是爲履虎艮爲虎者得乾之剛也兌說應之兌爲口有咥象兌一變而純乾兌又伏艮虎同類也故曰不咥尾者後也卦下也四尾而三履之故三四爻俱有履虎尾之辭荀爽九家以艮爲虎虞翻曰艮爲寅位寅爲虎又按天官書尾宿爲虎蓋尾在艮方故也初九素履往无咎履者禮也素者潔白未有飾也卦變自姤來初在巽下又卦體三四五互巽巽爲白故曰素履然則履初之素其賁上之白乎九二履道坦坦幽人貞吉二變爲震震爲大塗是道之坦坦者也兌爲少女有幽人之象六三眇能視跛能履履虎尾咥人凶武人爲于大君下體互離上體互巽離爲目爲甲胄巽爲股下兌爲毁折夫離目而兌毁之𦕈也巽股而兌折之跛也甲胄有武人之象六三德弱而志暴故聖人致其戒曰眇不能視而自任以能視跛不能履而自任以能履智力不足以禦虎而直履其尾故咥人凶也位當兌口有咥人之象乾爲君有大君之象九四履虎尾愬愬終吉四動互震震爲恐懼有愬愬之象九五夬履貞厲下兌爲夬九五履之故曰夬履上乾下兌爲履上兌下乾爲夬上九視履考祥其旋元吉應爻互離離爲目故曰視祥者吉之先見者也視其所履則祥可考矣旋反也初上卦之始終初言往上言旋而履之象見矣夫初尚素履二尚幽貞三武而凶四懼而吉五决於行則厲上反其初則祥傳曰履不處然亦未嘗忘於處也乾下坤上泰小往大來吉亨坤本居下自下而上故曰往乾本居上自上而下故曰來初九㧞茅茹以其彚征吉茹茅根之相連者彚類也茅雖不共本㧞其茅則根連而起陽類同進者似之泰否初爻俱有茅象者泰初變巽否初變震震巽木也又在下也故曰茅茹九二包荒用馮河不遐遺朋亡得尚于中行荒者榛蕪未治之謂初九是也初雖陽德窮而在下行未成名未立荒莫甚焉二乃容受而引納故曰包荒馮河者無舟而涉過於勇者九三是也三之陽剛不中好勇無裁馮河莫甚焉二乃隨才器使不嫌其在已上故曰用馮河遐者逺也外三隂是也二乃誘掖訓化不以逺而棄之故曰不遐遺朋者同類也内三陽是也二雖包初之荒用三之馮河而無昵比之私故曰朋亡此九二所以得尚于中行也中行六五也尚者企而配之之謂二五同心剛柔相應故曰尚又坤虚有包荒之象二變互坎河也以乾涉坎有馮河之象包荒者二隂能容也故不遐遺用馮河者九剛能斷也故朋亡此大臣中行之道而世之泰也有由然矣九三无平不陂无往不復艱貞无咎勿恤其孚于食有福平陂往復天運也艱貞勿恤人事也于食有福于以享其所有之福也上互震爲大塗故曰平下互兌爲澤故曰陂六四翩翩不富以其鄰不戒以孚陽爲冨重隂故曰不富五上鄰也坤體有翼象故曰翩翩泰變則三陽失實故六四率其隂類而來復所謂無往不復也五上從四不戒以孚小人伺君子之衰而連黨以進其情狀蓋如此六五帝乙歸妹以祉元吉史謂湯爲天乙尚書多士篇又謂自成湯至於帝乙左傳哀公九年晉趙鞅救鄭陽虎筮之得此爻其言曰微子帝乙之元子也是又以帝乙爲紂父今易所稱帝乙未知爲誰伊川謂帝乙制王􅁎下嫁之禮法者也此言是矣又京房載湯嫁妺之辭曰無以天子之尊而乘諸侯無以天子之富而驕諸侯隂之從陽女之從夫本天地之義也往事爾夫必以禮義是以帝乙爲湯也然卦互震兌帝出乎震有帝乙之象震爲長男兌爲少女由長男言之則兌爲妹也歸妹之卦上震下兌而此卦互體有之又卦變亦爲歸妹六五之隂下交九二之陽又有歸妹之象故曰帝乙歸妹上六城復于隍勿用師自邑告命貞吝坤爲邑上變居初則爲艮巽蠱矣故曰復隍變巽則有告命之象子夏傳曰隍城下池也城之體由基土培扶乃得爲城否則壊損猶君賴臣輔翼也坤下乾上否之匪人不利君子貞大往小來否雖氣運然所以致否者由於匪人初九㧞茅茹以其彚貞吉亨泰初以同征爲吉否初以同貞爲亨六二包承小人吉大人否亨隂虚承上故曰包承六三包羞六三德不稱位可羞也而不能改其素行忍隱自處故曰包羞聖人於泰否每稱包者泰否乃天地之變天地無所不包也然天包地外故泰有包荒之象地不能包天故云包承包羞乾坤分量如此九四有命无咎疇離祉否將轉泰此天命也小人疇類將離其祉則君子可以受祉矣九五休否大人吉其亡其亡繫于苞桑繫于桑不可㧞繫于叢苞之桑尤不可㧞九五當乾之中是坎之中爻也而五變亦互坎坎爲叢􅁄故曰苞桑上九傾否先否後喜後喜者言未可遽喜也惟以傾否爲先務必其亡其亡而後有喜也離下乾上同人于野亨利涉大川利君子貞乾伏坤爲野離伏坎爲川野者曠逺之地川者險難之所于野亨大同也利涉大川同舟共濟也君子貞者乾也按京氏易傳訟降爲同人夫訟之乾在坎水之下故不利涉川同人則乾居上體而下互巽木又伏坎水故利涉大川初九同人于門无咎初變成艮艮爲門艮陽畫居三爻人位也故曰同人于門門限隔也于往也故孔子小象以出門贊之建安邱氏曰兩户爲門隂畫偶有門之象同人與隨之初九節之九二皆前遇偶畫故謂之門六二同人于宗吝二互巽巽與離皆坤隂也坤爲宗同于宗族而已故吝九三伏戎于莽升其髙陵三歲不興離爲戈兵故曰戎下體互巽三變爲震互則爲艮震巽草莽也艮爲山在下體之上陵也重剛有憑上之志故曰升又震動有升象自三至五隔三位也故曰三歲二與五同者也三欲攘二而畏五伏于巽而升于震見三之情狀矣伏戎避五也升高望二也五終不可敵是以三歲不興九四乘其墉弗克攻吉四乾伏坤坤土在内外之際有墉象四動互坎入險有相攻之象乘墉是凌九三之上五用大師故弗克攻也三升髙陵升四而望五四乘其墉越三而攻二九五同人先號咷而後笑大師克相遇二互巽伏震五伏坤坤爲迷巽爲號震爲聲號咷也二不同於三四而往同於五離目動爲笑故曰先號咷而後笑卦伏坤坎坤坎合體有師象故三四五爻有戎攻大師之辭上九同人于郊无悔伏坤爲郊乾下離上大有元亨易之一隂五陽者凡六卦大者陽也姤同人履小畜夬五卦皆柔不得位不能有其大惟此卦柔得尊位大中而上下五陽皆應之故爲大有乾居下卦故言元亨而不言利貞也初九无交害匪咎艱則无咎初爻孤逺在下未涉於害卦變自小畜而來小畜初九曰何其咎大有初九曰匪咎甚言初本无咎也又曰復自道曰艱者必如是而後可免咎也九二大車以載有攸往无咎剛中之德上應六五下賢之君凡五所有之大二能載之此大臣之事也乾伏坤坤爲大輿故曰大車以載九三公用亨于天子小人弗克易之辭有王有先王有后有大君有帝有天子王以德業言先王以垂統言后者天子諸侯之通稱大君者天子之尊稱帝者謂其主宰之專天子謂其統位之正也九三居公位有剛健之德處大有之時與五同功故其象曰公用亨于天子蓋周官上公朝於天子饗禮九獻食禮九舉體貌極隆小人無德何克以當之言小人者見九三之爲君子也按左傳秦伯師於河上將納襄王晉文公筮得此爻卜偃曰吉遇公用享于天子之卦戰克而王饗吉孰大焉且是卦也天爲澤以當日天子降心以逆公不亦可乎大有去睽而復亦其所也文公乃辭秦師而逆王遂成霸業九四匪其彭无咎彭大也大有六五所有也九四剛臣嫌於僭逼必不有其大而後可以无咎一說彭旁也謂三也九四上近至尊下比權臣若能專心承五非賴乎三乃得无咎六五厥孚交如威如吉離體中虚有孚象按左傳季友將生桓公筮得此爻卜楚邱之父曰同復於父敬如君所謂乾有君父之象而歸魂卦大有變乾故也上九自天祐之吉无不利下卦乾體有天象子曰履信思乎順又以尚賢也謂六五也厥孚交如履信也以柔居尊思順也下應九二尚賢也此六五所以能有其大自天祐之吉无不利也夫六五之效言於上九者大有之吉以此終也程朱謂上九下從六五夫六五君也誰復爲之上而下從者乎或曰六五爲君即天也上九老臣得君受大有之福故爻義如此易象鈎解卷一
