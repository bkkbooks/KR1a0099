body:
  text: 易象鈎解卷三明陳士元撰艮下兊上咸亨利貞取女吉艮為少男兊為少女夫婦相感莫甚於少者卦以艮為主故有取女之象初六咸其拇拇足大指也二至四互巽巽伏震震為足初在震足之下有拇象拇附於足勢難自行故不言吉凶六二咸其腓凶居吉互巽為股二在下體之中居股之下故曰腓腓足肚也巽為進退故曰凶二本艮體艮止也故曰居貞吉九三咸其股執其隨徃吝巽有股象卦變自泰來隨之六三變為咸之九三咸之初六變為隨之初九隨卦震動在下有隨人之象咸之九三則居艮體之極艮為手故有執其隨之象九四貞吉悔亡憧憧徃来朋從爾思咸以無心為正四居三陽之中心之位也以九居四隂陽雜矣又居說體感不以正憧憧動心之貌四變成坎坎為心病有憧憧之象初與四交有朋象九五咸其脢无悔子夏易傳曰脢脊肉也王弼易傳曰脢者心之上口之下其膺膈之間乎兊伏艮艮止也五在伏艮之中止而不動故有此象上六咸其輔頰舌兊為口輔頰舌三者皆口象言語之所出也以此感人咸道窮矣咸以人身取象自拇至股下體之序自心至口上體之序也上六隂畫如人口之上開初二隂畫如人足之分立艮亦以人身取象隂畫在上體之中故艮其輔之象在五爻云巽下震上恒亨无咎利貞利有攸徃乾坤氣化之始故曰元亨利貞咸恒形化之始故言亨利貞而已咸以少男下少女此男女之新婚恒以長女下長男此夫婦之偕老而天地日月君臣父子上下長幼之定分皆具於恒體之中矣初六浚恒貞凶无攸利卦自泰六四變為初六初居巽下三至五互兊巽股入於兊澤之下入之深者也故有浚恒之象九二悔亡此爻與大壯之九二解之初六皆以爻義明占而象在其中孔子曰九二悔亡能久中也中也者聖學相傳之要也執中之說開於堯舜備於臯謨箕範而莫詳於易内卦之中六十有四外卦之中亦六十有四得其中則吉失其中則凶此學易者所當玩也九三不恒其德或承之羞貞吝九三陽剛非無德者但居巽極其究為躁為進退故有不恒其德之象二承乎三見三不恒或為之羞然二以為羞而三則以為貞此所以吝也九四田无禽巽為雞有禽象二在地上有田象二既應五則巽禽為五有矣故九四田无禽六五恒其德貞婦人吉夫子凶巽為長女有婦人之象震為長男有夫子之象五居震體而隂柔不正下從九二之剛此婦人之道也大分不立權柄下移其魯哀晉元之世乎上六振恒凶上六當恒久之時為在上之臣宜靜鎮而安守其分也彼乃挾隂邪之資居震動之極必欲振而摇之如王安石之類是已上體互兊兊伏艮艮為手有振象艮下乾上遯亨小利貞卦二隂内長四陽外遯遯亨告君子小利貞戒小人也六二之辭利貞之義可見矣初六遯尾厲勿用有攸徃卦以上為首為角初為足為尾處遯之世知幾貴早上九剛而知幾其遯最先四五亦以剛在外卦而能遯矣惟初六在卦下居遯後有遯尾之象隂性不决艮止不行故曰厲勿用有攸徃六二執之用黄牛之革莫之勝說艮為手有執象上卦乾體伏坤坤為牛二在下卦之中為黄有黄牛之象艮又有革象艮止而乾健有莫之勝說之象五爻皆遯而六二獨不言遯者二為遯之主也前四陽皆為此爻而遯者也聖人猶幸其柔順中正之資未必能亂天下故示以執守中順之道焉六二小人也此即所謂小利貞也九三係遯有疾厲畜臣妾吉三近二隂當遯而有所係二三四互巽巽為繩有係象係則有疾而厲矣三既為二隂所係則必以臣妾畜之三變為坤坤為臣艮伏兊兊為妾故有畜臣妾之象九四好遯君子吉小人否四以剛德近君身雖未遁而心實好遁君子好遁小人弗能也九四當人位在乾體有君子之象變則成巽而互坎巽伏而坎䧟有小人之象九五嘉遯貞吉非正應而相昵曰係以中正而相應曰嘉隨九五孚于嘉遯九五嘉遯皆因三之係而見也上九肥遯无不利上無係累之疾故曰肥子夏曰肥饒裕也上九陽剛其遯最早是盖負道德之豐腴飽仁義之膏潤故其心寛綽而無所疑也乾陽充實有肥象又按古本肥作􅖦與蜚飛字同九師訓云遁而能飛吉孰大焉曹子建七啓云飛遯離俗張平子思𤣥賦云欲飛遯以保名註引易遯上九飛遯无不利為解是以飛遯為遯之速也遯變而為離有飛象此卦下艮上乾艮止也故下三爻為勿徃為執革為係畜乾行也故上三爻為好遯為嘉遯為肥遯乾下震上大壯利貞陽動於復長於臨交於泰至四爻而後壯泰不曰壯隂陽敵也陽過於隂則壯矣壯出於貞何徃不利初九壯于趾征凶有孚四居震卦為足初欲應四而在卦下壯于足之趾者也初變為巽巽為躁卦四不應初而初乃躁進取凶必矣故曰有孚九二貞吉九二因中得正曰貞吉者許之也九四不中不正曰貞吉者戒之也九三小人用壯君子用罔貞厲羝羊觸藩羸其角三居乾極若可用壯而聖人為其過剛不中故戒之曰小人則用壯君子則不然也盖小人以過剛為貞是危厲之道如羝羊觸藩羸其角君子豈如是乎三居人位有君子小人之象三至五互兊有羊象震為竹木為萑葦可用以為藩者也人之設藩皆在室家之外此卦震在外體故有藩象三在下卦之上有角象羸困也鄭𤣥羸作纍謂羈纍其角也三動互離羊性喜觸兊毁而離麗故有羸其角之象九四貞吉悔亡藩决不羸壯于大輿之輹三以四為藩四以五為藩四變成坤坤為輿震木動於輿下有輹象互兊為决有藩決之象震為大塗非但羣羊並進而大輿亦可徃也乾健震動有壯于大輿之輹之象六五喪羊于易无悔五居互兊之極變亦成兊本有羊象乃曰喪羊何也五當藩决之後隂柔不正又在動體動則為夬矣故有喪羊于易之象上六羝羊觸藩不能退不能遂无攸利艱則吉壯終動極有羝羊觸藩之象不能退居衆爻之上也不能遂處一卦之窮也故无攸利然猶幸其柔也故艱則吉上隂亦曰羝羊猶坤上六之稱龍也坤下離上晉康侯用錫馬蕃庶晝日三接康侯有功之諸侯也彖言侯者三屯豫建侯震也謂長子也晉康侯坤也坤有土有民故有封建之象坤為牝馬為衆有錫馬蕃庶之象離為日出於坤地之上有晝日之象周官大行人三饗三問三勞皆王接諸侯之禮也離居三數有三接之象離在午位亦有馬象或問午為馬火畜也而說卦傳以乾坎震為馬何也曰以卦位言之乾離同位以五行言之火為馬以八卦言之乾為馬觀諸天文奎北漢中之四星名為天駟東壁之北四星名為天廐傳舍之南五星名為司馬斗背六星謂之建亦名天馬是皆乾坎之位也房宿亦謂之天駟東一星又名天馬震位也故乾坎震三卦皆有馬象初六晉如摧如貞吉罔孚裕无咎初與四應初變則爲震動有晉如之象卦互艮坎艮止而坎䧟有摧如之象當此時也惟貞則吉何也摧如者罔孚之時也惟貞則能裕以處之可以免咎而得吉矣坤體安順故有裕象六二晉如愁如貞吉受兹介福于其王母六二當晉之時而中正無應動則成坎坎爲加憂有晉如愁如之象坤爲母六五柔居尊位有王母之象介福即彖之所謂蕃庶三接者也六三衆允悔亡坤體有衆象坤順之極有兑象二爲坤衆之長當康侯之位衆允則無摧愁之悔矣九四晉如鼫䑕貞厲子夏易傳作碩䑕碩大也國風曰碩䑕碩䑕無食我黍詩序曰碩䑕刺重斂也國人刺其君不修政貪而畏人若大䑕也爾雅䑕屬之中有鼫䑕郭璞註曰鼫䑕形大如䑕頭似兎尾毛青黄色好在田中食粟豆廣雅曰鼩䑕鼫䑕也埤雅鼫䑕似䑕而大能人立交前兩足而舞孫炎以為五技䑕荀子曰鼯䑕五技而窮是鼫䑕即鼯䑕也陸機云河東大䑕食人禾苗或謂之雀䑕夫雀䑕鼯䑕鼩䑕碩䑕皆鼫䑕也名異而䑕一也鼫䑕害稼又能升高且善避人而九四剛不中正貪而畏人居互艮之上艮為䑕故有鼫䑕之象然䑕性晝伏而夜動晉之時晝也䑕何為哉故曰貞厲六五悔亡失得勿恤徃吉无不利坎為加憂六五互坎故戒曰勿恤彖辭升言勿恤豐言勿憂爻則泰九三家人九五萃初六及此卦六五皆言勿恤然事有不必憂者則言勿恤以寛之事有不當憂者則言勿恤以戒之此爻勿恤則戒之之辭也上九晉其角維用伐邑厲吉无咎貞吝剛在卦上有角象坤為邑離為甲胄為戈兵有伐邑之象離下坤上明夷利艱貞離日為坤地所掩有明夷之象遇艱危之時而不失其貞處明夷之道也坤曰安貞吉明夷曰利艱貞臣道於是乎見矣初九明夷于飛垂其翼君子于行三日不食有攸徃主人有言離有飛象初在卦下有垂翼之象陽剛有君子之象上互震體震為足故曰行曰徃卦變自臨來下有兊體兌為口故曰食曰言王弼曰絶迹匿形不由軌路曰于飛懷懼而行不敢明顯曰垂翼然皆見之早也故三日不食接淅而行也主人有言衆人固不識也按左傳叔孫豹初生其父筮得此爻卜楚丘曰是将行而歸為子祀以䜛人入其名曰牛卒以餒死明夷日也日之數十自王以下其二為公三為卿食日為二旦日為三明夷之謙明而未融其當旦乎故曰為子祀日之謙當鳥故曰明夷于飛明而未融故曰垂其翼象日之動故曰君子于行當三在旦故曰三日不食離火也艮山也火焚山山敗於人為言敗言為䜛故有攸徃主人有言純離為牛世亂䜛勝勝将適離故曰其名曰牛夫既有此占而不免於餒死君子謂穆叔之不能早見也六二明夷于左股用拯馬壯吉卦互震坎震為左震伏巽為股有左股之象坎為美脊之馬震為作足之馬故有用拯馬壯之象九三明夷于南狩得其大首不可疾貞南者進而在前之方狩者畋而去害之事離為網罟南方之卦也有南狩之象卦以上為首三與上敵故徃誅之有得其大首之象離性暴速故戒以不可疾貞六四入于左腹獲明夷之心于出門庭三居明極與上六暗君為敵六四遠上而近三離為大腹互震為左伏巽為入四與初應自外入内是入于左腹也下互坎為心初九徃四則變而為艮艮為門四以柔正居暗地入於左腹去暗就明也三四内外之限是當門庭之處四暗尚淺得遂其遠去之心以就九三之明故有出門庭之象或曰腹坤象四在坤下有左腹象坤偶有門象出門庭猶可去而出乎坤也亦通六五箕子之明夷利貞五君位而以箕子當之者上六紂也六五得中紂不足以當之箕子與紂同姓之親也比干死㣲子去箕子所處更難矣意其當時天下之望亦或以六五之德位歸箕子此紂之所疑所謂内難者也箕子為之奴有明夷之貞焉五陽明六隂晦以六晦五故有箕子明夷之象上六不明晦初登於天後入於地坤伏乾坤為地乾為天離日為明卦變自臨來與晉體反對晉之初則離明登于天至此則離日不明而晦入于地矣夫明夷六爻當周公作易之時上六為紂三為武王四為㣲子五為箕子二為文王初其避紂之伯夷太公乎離下巽上家人利女貞巽為長女離為中女始為女中為婦終為母女貞則家道正矣二四兩爻隂柔得正有利女貞之象初九閑有家悔亡初為有家之始九有閑家之才離體外實内虚有家之象閑者慎其出入也初變成艮艮止也故有閑家之象六二无攸遂在中饋貞吉二在下卦之中坎為飲食二至四互坎故有中饋之象九三家人嗃嗃悔厲吉婦子嘻嘻終吝過剛不中有嗃嗃之象䧟於二四隂柔之間有嘻嘻之象三變互坤有婦象互坎為中男有子象卦變家人與兊皆自遯卦而來兊之六三變為家人之六二兊之九四變為家人之上九兊為口故曰嗃嗃嘻嘻六四富家大吉安順不薄之謂富記曰夫婦和家之肥是已巽體安順四居巽下隂柔得正家之所由以肥者也故有富家之象九五王假有家勿恤吉五當王者之位為天下國家之主居中守正有家之道至其極矣故曰王假有家假至也家道既至則不必憂恤而天下自治上九有孚威如終吉陽實為有孚之象上為嚴君有威如之象三與上居二卦之終故皆稱終焉兊下離上睽小事吉柔為卦主故小事吉初九悔亡喪馬勿逐自復見惡人无咎初四不相應四互坎為馬兊毁折有喪馬之象然初四同德故喪馬勿逐而自復坎為盗故有惡人之象九二遇主于巷无咎二變互艮艮為門為徑家門之曲徑者巷也主謂君也坎四近五納約自牖睽二應五遇主于巷皆非所由之正坎險睽乖之時不得不委曲相求如此也六三見輿曵其牛掣其人天且劓无初有終三變成乾乾伏坤坤為輿為牛互坎為曵兊伏艮艮手為掣三欲從上而位不中正四與二恃其陽剛或曵輿於後或掣牛於前其人謂上也天髠刑也天且劓者傷於上體也兊上缺艮為鼻有天且劓之象一說其人謂三也乾為天天且劓之謂三昏暗無所聞知也九四睽孤遇元夫交孚厲无咎初四失應故初喪馬而四睽孤陽剛同德故相遇而交孚四進為五五退為四則為中孚故有交孚之象九四變則互震震為長子有元夫之象六五悔亡厥宗噬膚徃何咎宗謂二也噬嗑六二曰噬膚睽二變為噬嗑又自二至上有噬嗑之象同人六二以九五為宗睽六五以九二為宗皆以離中隂爻言之支子從宗子也夫五以二為宗其合也如噬膚之易二以五為主其合也有于巷之遇宗者親之也上以情交下也主者尊之也下以分敬上也上九睽孤見豕負塗載鬼一車先張之弧後說之弧匪冦婚媾徃遇雨則吉上始疑三故曰睽孤離目為見坎為豕離再索於坤坤為鬼為輿離為矢坎為弓又弦木為弧本睽象也三上非有真見者各以意見之妄而有所疑三在二前見二有曵輿之象故上見二載三有載鬼一車之象三在四後見四有掣牛之象故上見三負四有豕負塗之象上變為震故曰塗離伏坎三至五互坎坎為雨上九徃遇六三故曰徃遇雨艮下坎上蹇利西南不利東北利見大人貞吉後天八卦方位艮坎東北卦與西南坤離卦相對艮坎合為蹇故不利東北坤離合為晉晉無蹇難故利西南三至五互離離目為見九五陽剛中正居尊位有大人之象六二應之上六近之故曰利見大人蹇與睽反睽取目有所見之象重離在前也故三上二爻皆曰見蹇取足不能進之象重坎在前也故爻有徃來之辭初六徃蹇來譽上進為徃不進為來艮立也故曰來譽六二王臣蹇蹇匪躬之故五王也二臣也卦有重坎故曰蹇蹇匪躬之故從王事也艮體不獲其身故有匪躬之象九三徃蹇來反上柔無位故徃蹇反者既徃復反之辭來就六二之王臣則蹇可反而為安矣三變則坎上坤下而為比有依附之義故曰來反六四徃蹇來連四已至坎矣故曰徃蹇變則上兊下艮而為咸有交感相連之象九五大蹇朋來五處坎中故曰大蹇程傳以六二正應為朋或曰三五同德為朋蹇之九三變而為解之九四故解之四曰朋至蹇之五曰朋來上六徃蹇來碩吉利見大人碩大也陽也剥上九陽稱碩果蹇上六從九五之陽有來碩之象碩言功大人言德也蹇六爻惟上六有吉利之辭者上已出坎故也一說來碩吉為句謂徃則蹇來則得大吉也亦通坎下震上解利西南无所徃其來復吉有攸徃夙吉坎震東北之卦難解於東北至西南則無不利矣解與蹇反解之九二蹇之九五也解之九四蹇之九三也蹇九五來為内卦之二外難解矣難解則宜靜靜則復常而得中故曰无所徃復吉蹇九三徃為外卦之四震足動矣動宜早徃早復不可久擾故曰有攸徃夙吉初六无咎四為震主初與為應以六居初剛柔適宜得來復之義矣故孔子曰剛柔之際義无咎也九二田獲三狐得黄矢貞吉二為田坎為狐二至四互離離為􅃠罟有田獵之象卦凡四隂而六五為君初三上有三狐之象狐隂也三衆也衆隂既去而後難可解也二變坤其色黄離為矢故有得黄矢之象二與五應能去隂險隱伏之小人而得中直之君子是人臣之正道也故曰貞吉六三負且乗致冦至貞吝三負四乗二坎為輪有乗象坎為盗有冦象六隂也小人也而居剛僣也乗剛又僣也如負販之人乗軒而致冦不言凶咎惟曰吝者當解之時也或曰三變成巽巽為近利市有負象九四解而拇朋至斯孚四震為足初六應於下體有拇象初為小人九二陽剛與四為朋也四解其初則二之朋自至而孚於五矣互坎中實為孚象六五君子維有解吉有孚于小人五變互巽巽爲繩難之未平如亂繩然故曰維平難者如理亂繩而解其結故曰維有解五柔無才必用九二君子以平難然成難者小人也以小人之退爲驗故曰有孚于小人上六公用射隼于高墉之上獲之无不利上六公位也六三隂柔在互離之中離爲禽有隼象三變成巽互乾乾伏坤坤土有墉象巽爲高又三居下卦之上有高墉之象離爲矢坎爲弓有射象上與三相對有公用射隼于墉上之象解之世莫先於去小人故九二欲其獲狐六三戒其致冦九四欲其解拇六五欲其退小人上六欲其射隼一卦六爻而去小人者居其五狐者小人之妖媚者也拇者小人之微賤者也隼者小人之鷙悍者也負乗者小人之僣竊者也當解之世而聖人猶加防焉其思患也深矣兑下艮上損有孚元吉无咎可貞利有攸往曷之用二簋可用享内卦本乾外卦本坤三上相易剛得柔為損柔得剛為益皆以内卦為主也卦互震坤兊口震足坤腹有簋象又此卦之體頂踵實而腹虚如二器之上覆下承也故有二簋之象曷之用二簋可用享享且不敢豐則自奉之損可知矣初九已事遄徃无咎酌損之已止也初止其所為之事而遄徃以應四四居艮體艮為止有己事之義焉酌損者量其所受隨器而止也初九過剛故有此戒初變成坎有斟酌之象九二利貞征凶弗損益之陽剛兊體剛動兊說故曰利貞征凶六三三人行則損一人一人行則得其友卦自泰來損乾九三益坤上六損一人也三徃而為上則艮兊男女相合而有化生之功一人行而得其友也泰之乾坤為天地損之艮兊為男女故繫辭傳有天地男女致一之說六四損其疾使遄有喜无咎四變互坎坎心病耳痛有疾象當損之時又居兊上有損其疾之象兊為說有喜象損疾而喜人情也乃曰使遄何也初與四應四損其疾而初遄徃以應之初言遄徃四言使遄是初之遄實四之損疾有以使之也六五或益之十朋之龜弗克違元吉班固食貨志元龜岠冉長尺二寸直二千一百六十為大貝崔憬謂元龜直二十大貝雙貝為朋卦自四變而有重離之體離為龜互坤其數十故曰十朋之龜一說十朋之為句謂六二虚中應二以來天下之賢天下之有善者皆來增益之或者衆也非一人可指之謂也一人益之十人朋而從之龜皆從而弗違之人謀鬼謀天下大同此所以得元吉也上九弗損益之无咎貞吉利有攸徃得臣无家損極艮止止人之損而益乎人受而能施者也上變成坤有臣家之象得臣謂得天下臣民之心无家謂不自私其家也震下巽上益利有攸徃利涉大川卦自否變損四益初也盖損其否則否可為泰故卦名為益損其泰則泰反為否故卦名為損也此卦二五中正震動巽入有利徃之象震巽皆木有利涉之象初九利用為大作元吉无咎陽為大震為作大作者興作之大者也如享帝凶事遷國皆大作之義初為震陽有元象六二或益之十朋之龜弗克違永貞吉王用享于帝吉益二即損五故其辭同二重隂互坤故戒以永貞二居人臣之位受益不敢自專故致之王者以享帝九五王也帝出乎震二變成兌兌為巫故有王用享帝之象六三益之用凶事无咎有孚中行告公用圭三四在一卦之中故皆曰中行三欲益民四欲益國不私其心而恊于上下故皆有告公之象三為公位當益下之時有拯凶之責水旱扎瘥兵甲之類皆凶事也卦體中虚為有孚之象乾為玉荀九家震為玉有圭象周禮珍圭以徴守以恤凶荒是也朱子曰用圭所以通信楊誠齋曰用圭動必以禮二義皆是六四中行告公從利用為依遷國卦互坤有國象初曰作四曰遷初四相應初本坤體而上遷於四故曰遷國依謂附五也以臣附君得所依矣故用以遷國而有利九五有孚惠心勿問元吉有孚惠我德五與二應二變則上巽下兌有中孚之象故兩言有孚有孚惠心五之孚也有孚惠我德二之孚也程子曰陽實在中有孚之象王輔嗣曰益莫大於信惠莫大於心上九莫益之或擊之立心勿恒凶巽下震上為恒震下巽上為益益之上變而為恒之三震動求益而無益者也故與恒三之辭相類巽為進退為不果為躁卦有勿恒之象三至五互艮艮為手有或擊之象上變成坎坎為心病故曰立心勿恒凶乾下兌上夬掦於王庭孚號有厲告自邑不利即戎利有攸徃乾健兌說乾決兌和兌伏艮為庭五為王上六在五前有王庭之象夬自姤變巽風為號又兌口亦為號二五剛中為孚有孚號之象乾伏坤坤為邑兌口在坤外有告自邑之象告自邑者猶言告我家也謂徧告五陽也兌為西方肅殺之卦有即戎之象不利即戎言不尚武也利有攸徃則夬道成矣夫五陽決一隂至易也而彖有危厲之辭其為君子謀也至矣哉初九壯于前趾徃不勝為咎大壯上震爲足初在下體應之有趾象夬自大壯而積故初與三猶存壯之名大壯四陽其初九曰壯于趾矣今夬五陽則壯于前之趾也初四不相應初變爲巽巽弱而兌毁故曰往不勝九二􅅥號莫夜有戎勿恤三動成離互巽離伏坎坎爲加憂􅅥也巽爲號故有􅅥號之象離爲日巽爲入日在兑西之下而入于地有莫夜之象離爲戈兵有戎象兑説見於外有勿恤之象昔王子獻卜遇夬之九二卜者告之曰必夜有驚後有兵權未幾果夜遇冦旋得洪帥九三壯于頄有凶君子夬夬獨行遇雨若濡有愠无咎三變互離有重兑之體離目兑口目口之間爲頄又兑爲頰頄頰骨也九三當夬之時處乾之上有壯于頄之象夬夬決之又決重兑之象也剛過不中故曰有凶有愠復六四處五隂之中與初九應故言獨復夬九三處五陽之中與上六應故言獨行獨者違衆自立復四從君子夬三從小人故其辭險易不同也兌為澤有遇雨若濡之象九四臀无膚其行次且牽羊悔亡聞言不信夬四乃姤三之反姤三居巽股之上有臀象夬四與姤三皆變則臀无膚矣三在卦上四在卦下皆有皮膚之象膚者隂爻也故噬嗑六二剥六四睽六五皆以隂為膚夬四姤三皆陽爻也故有无膚之象巽為進退故有其行次且之象臀无膚不可處也其行次且不可行也四當牽連衆陽而進讓之使前而已出其後則可无悔兌為羊乾為言四變成坎坎為耳痛為心病有聞言不信之象九五莧陸夬夬中行无咎莧陸或以為一物或以為二物朱子本義云莧陸今馬齒莧其語錄又云莧者馬齒陸者商陸皆感隂氣之多者朱漢上云莧陸二物皆兊澤之草也子夏易傳曰莧陸木根草莖剛下柔上也王輔嗣曰莧陸草之柔脆者或曰莧陸是莧生於陸地喻小人之在顯位者五為夬主四陽助之決去上六一柔如去莧焉不難矣然必中行乃得无咎聖人儆君子而防小人也九五當決隂之任以陽居陽有夬夬之象在上卦之中有中行之象夬三月卦莧生之時垢五月卦瓜生之時故以莧瓜取象也上六无號終有凶兌口有號象上居窮地哀號無所矣卦上故曰終巽下乾上姤女壯勿用取女一隂遇五陽是為不正之壯女陽至四爻而後壯今姤一隂即為壯者隂陽不同情女子小人夷狄漸不可長也初六繫于金柅貞吉有攸徃見凶羸豕孚蹢躅柅諸儒多以為止車之物按說文作檷注云絡絲趺也王肅作抳從手亦以為織績之器朱漢上云離巽之柔為絲謂巽為木為風巽互離木中含火火生風風化蠶蠶為龍馬之精龍大火馬火畜蠶以火出而浴故太𤣥以火為絲賈逵以離為絲又姤五月火令也郭璞曰巽為風蠶屬也此卦下巽有絲象上乾為金金柅以金為絡絲趺也乾初九甲子坎位有豕象六柔不正與九二遇其心如亂絲然九二乃以金柅繫絡而經理之則從正而得吉初若剥剛而徃則見凶何也初如羸豕雖未剛猛然其心嘗蹢躅也巽為躁卦故有蹢躅之象王輔嗣曰羸豕牝豕也一說巽為繩有繫象繫于金柅何物也羸豕也先言金柅而後言羸豕不先得其繫之之地則逸其繫之之物矣亦通按初六取象不一自本爻觀之曰豕二四觀之為魚九五觀之為瓜皆取隂物在下之象九二包有魚无咎不利賔巽為魚謂初也二以剛中近而包有之然初四正應四乃初賔也初為二有故不利賔孔頴逹以包為庖九三臀无膚其行次且厲无大咎姤九三即夬九四三非初應而乗承皆剛不能進退巽為股在股上有臀象過剛無柔有无膚之象巽有次且之象九四包无魚起凶初為二有故四无魚四剛不中初巽伏震震動也故有起凶之象九五以杞包瓜含章有隕自天杞良材南方之木巽木也指九二也二變成艮為果蓏瓜蓏屬指初六也五為姤主知初六之勢必至剥陽故用九二之杞以包初六之瓜所以制隂者無不至矣夫何為哉惟含其陽明之章使隂柔不得以窺伺而已五變成離故曰章乾為天有隕自天謂剥陽窮而復生於下也其所謂盡人謀以聽天命者乎包瓜子夏作匏瓜上九姤其角吝无咎在卦之上角象也上九陽剛君子自處於高亢之地何所遇哉惟以我之高遇彼之觸而已姤其角者遇其觸也雖有悔吝反之於身則无咎大壯九三之羸其角晉上九之晉其角角在我也此爻之姤其角角在彼也角在彼而我遇之也坤下兌上萃亨王假有廟利見大人亨利貞用大牲吉利有攸徃卦互艮巽艮為門闕巽為高其上為宗廟巽伏震為長子有長子祀廟之象五為萃主萃之時必建邦設都宗廟為先故首言王假有廟九五王位剛健中正有大人之象六二柔順中正而徃應之二變互離離目為見故曰利見大人坤為牛兌為刑殺殺牛以奉宗廟有用大牲之象物萃則力贍而事有成故利有攸徃初六有孚不終乃亂乃萃若號一握為笑勿恤徃无咎上與四應四互巽為不果六三又承乎四故初六心懷嫌疑有孚而不終也心疑則迷亂而萃不以正故曰乃亂乃萃兌為口巽為號有若號之象艮為手有一握之象兌為說有笑象一握謂四也初號四以求應則四必諒初之心一笑而釋然矣此聖人示人自新之方也六二引吉无咎孚乃利用禴艮手巽繩有引象六二中正引坤類以從五故吉且无咎兌巫在上有享神之象坤虚有孚故初二皆有孚象周禮宗伯以禴夏享先王註曰夏則陽盛其享以樂為主朱漢上曰禴夏祭以聲為主祭之薄也王輔嗣曰六二居萃之時處於中正而行以忠信故可省薄薦於鬼神也夫卦用大牲乃王者所以隨其時二孚用禴乃臣下所以通乎上在乎心之萃非在物之厚薄也六三萃如嗟如无攸利徃无咎小吝巽號兌口三無正應有嗟如之象九四大吉无咎四剛不中應初比三而近乎九五故必大善然後无咎九五萃有位无咎匪孚元永貞悔亡五剛居尊為萃之主萃有位矣比以五隂比一陽故彖曰元永貞萃有二陽故獨以元永貞歸之九五五本中實為孚而九四專而逼已信不孚物故曰匪孚上六齎咨涕洟无咎齎持也艮為手故有齎象咨歎息也兌為口故有咨象齎咨者上與三相持歎息也人之泣也液出於目曰涕出於鼻曰洟居兌之上兌澤下流於目鼻有涕洟之象上六以柔乘剛獨力無助六三在下又不中正惟相持歎息涕洟而已然憂懼之至故可以免禍咎巽下坤上升元亨用見大人勿恤南征吉升與萃反萃坤在下今則坤升在上升上則大通矣故曰元亨大人九二也用見五應之也五變互離離為目有用見之象二變互坎坎有恤象故曰勿恤離南方之卦自巽而坤有南征之象易以陽為大凡言大人皆陽爻也萃見大人六二得君也升見大人六五得臣也初六允升大吉四坤體為衆為順互兌為口有衆口順從之象故曰允初六為巽之主卑柔無應豈能自升惟二三以一體而信初四以應位而信合志上升故大吉九二孚乃利用禴无咎二以中實之德應虚中之君兩誠相合何用乎繁文如禴祭之簡無假外飾也九三升虚邑坤為邑隂為虚三隂順從於外而九三上升無阻有升虚邑之象六四王用亨于岐山吉无咎坤土互兌西有岐山之象四以順道而升者也兌為巫有享祀之象一說亨作亨通之亨四當諸侯之位今乃謂之王者盖指文王也文王以服事殷而天下方徃歸以為王此其所以亨通於岐山之一隅而有天下三分之二也故吉且无咎六五貞吉升階坤土為階巽為髙有升階之象上六㝠升利不息之貞坤為𡨕晦升至上六極矣而猶不知止焉升之㝠者也若移其𡨕升之心而為進德之心則利矣豫升上六皆隂爻也故皆有㝠象豫曰有渝升曰不息吉凶無門惟人所召故訟之終凶用之自訟則吉恒之亨利用之浚恒則凶乾初有勿用之占而孔子歴聘以行志坤四有括囊之戒而孟子好辨以闢邪然千載而下善用易者莫孔孟若也故曰神而明之存乎其人坎下兌上困亨貞大人吉无咎有言不信大人謂二五兌口不掩有言象坎剛中有孚信之象坎兌相失故有言不信當困而言人誰信之初六臀困于株木入于幽谷三嵗不覿人之體行則趾為下坐則臀為下初六困而不行有坐困之象株木乃木之無枝葉者坐於株木不安可知卦互巽離離木科上稿有株木之象又巽為木為股九四正應當臀之處為上六所掩亦有臀困於株木之象巽為入坎為幽谷初在巽坎之下故曰入于幽谷離目為覿而坎掩之自二至四歴三位故曰三嵗不覿鄭合沙曰困卦坎兌相重兌秋坎冬兌一隂始得秋氣而蔓草未殺故為葛藟之困六三秋冬之交蔓草脱葉而刺存故爲蒺藜之困初在坎下正大冬之時也蔓草為霜雪所殺所存者株木而已三爻皆隂故繫以草木之象九二困于酒食朱紱方來利用享祀征凶无咎坎酒兑口有酒食之象朱紱指五也巽爲股卦變自泰來有乾坤之體乾爲大赤坤爲黄赤黄為朱乾衣坤裳蔽于膝股之上有朱紱之象二五同德當困之時惟誠能通故利用享祀上六爲宗廟五來二往則上爲震下互艮震長子艮門闕長子升自門闕至於宗廟有享祀之象六三困于石據于蒺藜入于其宮不見其妻凶上兑伏艮艮為石四五是也坎爲蒺藜二是也六三上困四五下據九二有困于石據於蒺藜之象卦互巽離巽爲入坎爲宮爲夫離爲妻三居坎上兑下而離體隠於其中有入于其宫不見其妻之象按左傳齊崔杼取唐公之妻筮得此爻史曰吉陳文子曰夫從風風隕妻不可妻也且其繇曰困于石據于蒺藜入于其宫不見其妻凶困于石往不濟也據于蒺藜所恃傷也入于其宮不見其妻凶無所歸也崔子曰嫠也何害先夫當之矣遂取之莊公通焉杼因弑君而罹於禍九四來徐徐困于金車吝有終初與四應為九二金車所䧟故來徐徐二得乾陽乾為金坎為輪有金車之象初四正應故有終九五劓刖困于赤紱乃徐有說利用祭祀兌伏艮為鼻巽伏震為足兌金刑之有劓刖之象坎為赤乾為衣巽為股赤紱臣服在股上謂九二也巽為徐兌為說故曰乃徐有說祭祀之象已見九二二五君臣說而人神和可以濟困矣上六困于葛藟于臲卼曰動悔有悔征吉巽為草木葛之附木最出木杪上六隂柔居卦上有葛藟之象曰動悔有悔征吉明示兩途使人自擇也易象鈎解卷三
